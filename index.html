<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <title>Phonetic Flow v2.7.0</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --l-color: #2ecc71;
            --r-color: #e67e22;
            --ui-bg: rgba(30, 39, 46, 0.4);
            --accent: #f1c40f;
            --text-color: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Courier New', Courier, monospace; /* Zelda-esque feel */
            color: var(--text-color); user-select: none;
            touch-action: none;
        }

        #game-container { 
            position: relative; width: 100vw; height: 100vh; 
            display: flex; overflow: hidden; 
            padding-bottom: env(safe-area-inset-bottom);
            box-sizing: border-box;
        }
        
        .bg-half { flex: 1; height: 100%; opacity: 0.12; pointer-events: none; }
        #l-bg { background-color: var(--l-color); border-right: 1px solid #333; }
        #r-bg { background-color: var(--r-color); }

        .side-stack {
            position: absolute; bottom: 80px; width: 160px; height: auto;
            display: flex; flex-direction: column-reverse; z-index: 5;
            padding: 10px; box-sizing: border-box; pointer-events: none;
        }
        #left-stack { left: 0; align-items: flex-start; }
        #right-stack { right: 0; align-items: flex-end; }
        
        .brick {
            width: 130px; height: 35px; margin-bottom: 4px;
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: bold; color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            animation: slideIn 0.2s ease-out; flex-shrink: 0;
        }

        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes starBurst {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.15); filter: brightness(1.8) drop-shadow(0 0 20px var(--accent)); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .purchased-anim { animation: starBurst 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 300; text-align: center; padding: 20px; box-sizing: border-box;
        }

        /* Zelda Shop Layout */
        #shopkeeper-area {
            background: #000; border: 4px solid #fff; border-radius: 10px;
            width: 90%; height: 200px; margin-bottom: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 15px; position: relative;
        }
        #shopkeeper-text { font-size: 18px; color: #fff; line-height: 1.4; min-height: 80px; width: 100%; }

        .popup-modal {
            background: rgba(30, 39, 46, 0.7);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--accent); border-radius: 30px;
            padding: 30px; width: 85%; z-index: 400;
        }

        .hidden { display: none !important; }

        button {
            padding: 16px 32px; font-size: 16px; border-radius: 40px;
            border: none; background: #3498db; color: white; cursor: pointer;
            margin: 5px; font-weight: bold; transition: transform 0.1s;
            font-family: 'Courier New', Courier, monospace;
        }
        button:disabled { background: #444; color: #888; cursor: default; }

        #lives-display { position: fixed; top: calc(20px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); font-size: 26px; z-index: 150; }
        #currency-display { position: fixed; top: 20px; right: 20px; font-size: 18px; color: var(--accent); z-index: 150; }

        .shop-container {
            width: 100%; display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; overflow-y: auto;
        }

        .level-card {
            background: #222; border: 2px solid #444; width: 80%;
            margin: 10px; padding: 20px; border-radius: 15px;
        }
        .level-card.active { border-color: var(--accent); background: #333; }
        .level-card.locked { opacity: 0.5; }
    </style>
</head>
<body>

<div id="lives-display">❤️❤️❤️</div>
<div id="currency-display">💰 0</div>

<div id="game-container">
    <div id="l-bg" class="bg-half"></div>
    <div id="r-bg" class="bg-half"></div>
    <div id="left-stack" class="side-stack"></div>
    <div id="right-stack" class="side-stack"></div>
</div>

<div id="level-select" class="overlay hidden">
    <h2 style="color: var(--accent)">ASCENDING TOWER</h2>
    <div id="stack-list" style="display: flex; flex-direction: column-reverse; align-items: center; width: 100%;"></div>
    <button onclick="showMenu('main-menu')" style="margin-top: 20px; background: #444;">BACK</button>
</div>

<div id="main-menu" class="overlay">
    <h1 style="color: var(--accent); font-size: 2.5rem;">PHONETIC FLOW</h1>
    <p id="level-name" style="color: #888;">Level 1: The L vs R Forest</p>
    <button onclick="startGame()" style="background: var(--l-color); width: 220px;">MISSION START</button>
    <button id="btn-world-map" onclick="showMenu('level-select')" style="width: 220px;">WORLD MAP</button>
    <button onclick="showMenu('shop-menu')" style="width: 220px;">STICKER SHOP</button>
    <button onclick="showMenu('sticker-book')" style="width: 220px;">BOOK</button>
</div>

<div id="pause-menu" class="overlay hidden" style="background: rgba(0,0,0,0.3);">
    <div class="popup-modal">
        <h2>PAUSED</h2>
        <button onclick="closeMenus()" style="background: var(--l-color); width: 80%;">RESUME</button>
        <button onclick="location.reload()" style="background: #444; width: 80%;">EXIT</button>
    </div>
</div>

<div id="shop-menu" class="overlay hidden">
    <div id="shopkeeper-area">
        <div id="shopkeeper-sprite" style="font-size: 50px;">🧙‍♂️</div>
        <div id="shopkeeper-text"></div>
    </div>
    
    <div id="trade-ui" class="hidden">
        <p>Select a sticker to trade for the Level Sigil:</p>
        <div id="trade-options" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>
        <button onclick="showMenu('shop-menu')" style="background:#444;">CANCEL</button>
    </div>

    <div id="normal-shop">
        <div id="shop-display" class="shop-container"></div>
        <button onclick="showMenu('main-menu')" style="width: 80%; background: #444; margin-top: 15px;">BACK</button>
    </div>
</div>

<div id="sticker-book" class="overlay hidden">
    <h2>COLLECTION</h2>
    <div id="book-display" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; margin:20px;"></div>
    <button onclick="showMenu('main-menu')">BACK</button>
</div>

<div id="game-over" class="overlay hidden">
    <h1 style="color: var(--r-color);">KEEP GOING!</h1>
    <button onclick="startGame()">RETRY</button>
    <button onclick="showMenu('main-menu')" style="background: #444;">MENU</button>
</div>

<div id="round-win" class="overlay hidden">
    <h1 style="color: var(--l-color);">CLEAR!</h1>
    <button onclick="showMenu('main-menu')">AWESOME</button>
</div>

<script>
    const levels = {
        1: { name: "L vs R Forest", sigil: "🌲", pairs: [
            {word:"Light",type:"L"},{word:"Right",type:"R"},{word:"Glass",type:"L"},{word:"Grass",type:"R"},
            {word:"Collect",type:"L"},{word:"Correct",type:"R"},{word:"Fly",type:"L"},{word:"Fry",type:"R"},
            {word:"Play",type:"L"},{word:"Pray",type:"R"},{word:"Climb",type:"L"},{word:"Crime",type:"R"},
            {word:"Lane",type:"L"},{word:"Rain",type:"R"},{word:"Lace",type:"L"},{word:"Race",type:"R"}
        ], stickers: [
            {emoji:"☁️", price:50}, {emoji:"🌱", price:100}, {emoji:"🌲", price:200}, {emoji:"🦅", price:300}, {emoji:"💎", price:500}
        ]},
        2: { name: "V vs B Valley", sigil: "🌊", pairs: [
            {word:"Vest",type:"L"},{word:"Best",type:"R"},{word:"Vote",type:"L"},{word:"Boat",type:"R"},
            {word:"Van",type:"L"},{word:"Ban",type:"R"},{word:"Vase",type:"L"},{word:"Base",type:"R"},
            {word:"Curve",type:"L"},{word:"Curb",type:"R"},{word:"Vent",type:"L"},{word:"Bent",type:"R"},
            {word:"Vat",type:"L"},{word:"Bat",type:"R"},{word:"Berry",type:"R"},{word:"Very",type:"L"}
        ], stickers: [
            {emoji:"💧", price:50}, {emoji:"🐚", price:100}, {emoji:"🦀", price:200}, {emoji:"🦈", price:300}, {emoji:"🔱", price:500}
        ]},
        3: { name: "Eat vs It Peak", sigil: "🏔️", pairs: [
            {word:"Eat",type:"L"},{word:"It",type:"R"},{word:"Seat",type:"L"},{word:"Sit",type:"R"},
            {word:"Feet",type:"L"},{word:"Fit",type:"R"},{word:"Sheep",type:"L"},{word:"Ship",type:"R"},
            {word:"Heat",type:"L"},{word:"Hit",type:"R"},{word:"Feel",type:"L"},{word:"Fill",type:"R"},
            {word:"Peel",type:"L"},{word:"Pill",type:"R"},{word:"Leave",type:"L"},{word:"Live",type:"R"}
        ], stickers: [
            {emoji:"❄️", price:50}, {emoji:"🧤", price:100}, {emoji:"⛺", price:200}, {emoji:"🎿", price:300}, {emoji:"🗻", price:500}
        ]}
    };

    let state = {
        curLevel: 1,
        maxLevel: 1,
        coins: { 1:0, 2:0, 3:0 },
        inventory: [],
        levelInvest: { 1:0, 2:0, 3:0 },
        lives: 3,
        isPaused: true,
        roundHits: 0
    };

    let currentBlock = null;
    let animationId = null;
    let typeInterval = null;
    const synth = window.speechSynthesis;

    function typeWriter(text, targetId, callback) {
        clearInterval(typeInterval);
        const el = document.getElementById(targetId);
        el.innerHTML = "";
        let i = 0;
        typeInterval = setInterval(() => {
            el.innerHTML += text.charAt(i);
            i++;
            if (i >= text.length) {
                clearInterval(typeInterval);
                if(callback) callback();
            }
        }, 40);
    }

    function showMenu(id) {
        state.isPaused = true;
        cancelAnimationFrame(animationId);
        document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        
        if(id === 'shop-menu') renderShop();
        if(id === 'sticker-book') renderBook();
        if(id === 'level-select') renderLevelSelect();
        
        updateUI();
    }

    function renderShop() {
        const invest = state.levelInvest[state.curLevel];
        const normalShop = document.getElementById('normal-shop');
        const tradeUI = document.getElementById('trade-ui');
        
        normalShop.classList.remove('hidden');
        tradeUI.classList.add('hidden');

        if (invest >= 500 && !hasSigil(state.curLevel)) {
            typeWriter("I see you have a keen ear for this floor. Trade me a rarity for the Master Sigil?", "shopkeeper-text", () => {
                const btn = document.createElement('button');
                btn.innerText = "LET'S TRADE";
                btn.onclick = startTrade;
                document.getElementById('shopkeeper-text').appendChild(document.createElement('br'));
                document.getElementById('shopkeeper-text').appendChild(btn);
            });
        } else {
            typeWriter("Welcome. Coins from this floor only, please.", "shopkeeper-text");
            const container = document.getElementById('shop-display');
            container.innerHTML = '';
            levels[state.curLevel].stickers.forEach(item => {
                const card = document.createElement('div');
                const count = state.inventory.filter(i => i.emoji === item.emoji).length;
                card.style = "background:#222; padding:10px; border-radius:10px;";
                card.innerHTML = `
                    <div style="font-size:30px;">${item.emoji}</div>
                    <button onclick="buyItem('${item.emoji}', ${item.price})" ${count >= 2 ? 'disabled' : ''}>💰${item.price}</button>
                `;
                container.appendChild(card);
            });
        }
    }

    function startTrade() {
        document.getElementById('normal-shop').classList.add('hidden');
        document.getElementById('trade-ui').classList.remove('hidden');
        const options = document.getElementById('trade-options');
        options.innerHTML = '';
        
        const myStickers = state.inventory.filter(i => i.level === state.curLevel);
        const unique = [...new Set(myStickers.map(s => s.emoji))];
        
        unique.forEach(emoji => {
            const btn = document.createElement('button');
            btn.innerHTML = emoji;
            btn.onclick = () => processTrade(emoji);
            options.appendChild(btn);
        });
    }

    function processTrade(emoji) {
        const itemData = levels[state.curLevel].stickers.find(s => s.emoji === emoji);
        if(itemData.price <= 50) {
            typeWriter("Hmph. This is common garbage. Bring me something rarer!", "shopkeeper-text");
            setTimeout(renderShop, 2000);
            return;
        }

        // Remove one instance
        const idx = state.inventory.findIndex(i => i.emoji === emoji);
        state.inventory.splice(idx, 1);
        
        // Add Sigil
        const sigil = levels[state.curLevel].sigil;
        state.inventory.push({emoji: sigil, level: state.curLevel, isSigil: true});
        
        state.maxLevel = Math.max(state.maxLevel, state.curLevel + 1);
        
        typeWriter(`Exquisite! This ${sigil} opens the path to Floor ${state.curLevel + 1}.`, "shopkeeper-text");
        setTimeout(() => showMenu('main-menu'), 2500);
    }

    function buyItem(emoji, price) {
        if (state.coins[state.curLevel] >= price) {
            state.coins[state.curLevel] -= price;
            state.levelInvest[state.curLevel] += price;
            state.inventory.push({emoji, level: state.curLevel});
            renderShop();
            updateUI();
        }
    }

    function renderLevelSelect() {
        const container = document.getElementById('stack-list');
        container.innerHTML = '';
        for(let i=1; i<=3; i++) {
            const card = document.createElement('div');
            card.className = `level-card ${state.curLevel === i ? 'active' : ''} ${i > state.maxLevel ? 'locked' : ''}`;
            const locked = i > state.maxLevel;
            const canJump = state.maxLevel >= 3 || i === state.curLevel;
            
            card.innerHTML = `
                <b>Floor ${i}</b><br>${levels[i].name}<br>
                ${locked ? '🔒 Locked' : '✅ Unlocked'}
            `;
            if(!locked && canJump) {
                card.onclick = () => { state.curLevel = i; showMenu('main-menu'); };
            }
            container.appendChild(card);
        }
    }

    function startGame() {
        cleanup();
        state.lives = 3;
        state.roundHits = 0;
        document.getElementById('left-stack').innerHTML = '';
        document.getElementById('right-stack').innerHTML = '';
        closeMenus();
    }

    function spawnBlock() {
        if (state.isPaused || state.lives <= 0 || state.roundHits >= 15) return;
        const pool = levels[state.curLevel].pairs;
        const pair = pool[Math.floor(Math.random() * pool.length)];
        
        speak(pair.word, () => {
            if(state.isPaused || currentBlock) return;
            const el = document.createElement('div');
            el.className = 'block';
            el.innerText = "?";
            el.style.left = "calc(50% - 50px)";
            el.style.top = "0px";
            el.addEventListener('pointerdown', (e) => { e.stopPropagation(); showMenu('pause-menu'); });
            document.getElementById('game-container').appendChild(el);
            currentBlock = { element: el, data: pair, top: 0 };
            animate();
        });
    }

    function animate() {
        if (state.isPaused || !currentBlock) return;
        currentBlock.top += 2.2;
        currentBlock.element.style.top = currentBlock.top + "px";
        if (currentBlock.top > window.innerHeight - 120) resolve(null);
        else animationId = requestAnimationFrame(animate);
    }

    window.addEventListener('pointerdown', (e) => {
        if (state.isPaused || !currentBlock || e.target.closest('.block')) return;
        resolve(e.clientX < window.innerWidth / 2 ? "L" : "R");
    });

    function resolve(choice) {
        if (!currentBlock) return;
        const data = currentBlock.data;
        const isCorrect = choice === data.type;
        
        const brick = document.createElement('div');
        brick.className = 'brick';
        brick.innerText = data.word;
        brick.style.background = isCorrect ? 'var(--l-color)' : 'var(--r-color)';
        
        const stackId = (choice || (data.type === 'L' ? 'R' : 'L')) === 'L' ? 'left-stack' : 'right-stack';
        document.getElementById(stackId).appendChild(brick);

        if (isCorrect) {
            state.roundHits++;
            state.coins[state.curLevel] += 10;
        } else {
            state.lives--;
            if(state.lives <= 0) return showMenu('game-over');
        }
        cleanup();
        updateUI();
        if(state.roundHits >= 15) {
            state.coins[state.curLevel] += 50;
            setTimeout(() => showMenu('round-win'), 500);
        } else {
            setTimeout(spawnBlock, 400);
        }
    }

    function cleanup() {
        if (currentBlock) currentBlock.element.remove();
        currentBlock = null;
        cancelAnimationFrame(animationId);
    }

    function renderBook() {
        const container = document.getElementById('book-display');
        container.innerHTML = '';
        state.inventory.forEach(item => {
            const d = document.createElement('div');
            d.style = "font-size:45px; margin:5px;";
            d.innerText = item.emoji;
            container.appendChild(d);
        });
    }

    function hasSigil(lv) {
        return state.inventory.some(i => i.level === lv && i.isSigil);
    }

    function closeMenus() {
        document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
        state.isPaused = false;
        if (!currentBlock && state.roundHits < 15) spawnBlock();
        else animate();
    }

    function updateUI() {
        document.getElementById('currency-display').innerText = `💰 ${state.coins[state.curLevel]}`;
        document.getElementById('lives-display').innerText = "❤️".repeat(Math.max(0, state.lives));
        document.getElementById('level-name').innerText = `Level ${state.curLevel}: ${levels[state.curLevel].name}`;
        
        // Hide world map unless you've hit the criteria
        const worldBtn = document.getElementById('btn-world-map');
        if(state.maxLevel >= 3) worldBtn.classList.remove('hidden');
        else worldBtn.classList.add('hidden');
    }

    function speak(text, callback) {
        synth.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        u.rate = 1.0;
        if(callback) u.onstart = callback;
        synth.speak(u);
    }

    updateUI();
</script>
</body>
</html>
