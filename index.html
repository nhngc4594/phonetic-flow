<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonetic Flow v2.8.0</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #e0e0e0;
            --accent-color: #ffd700;
            --danger-color: #ff4444;
            --lane-width: 140px;
        }

        body, html {
            margin: 0;
            padding: 0;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100%;
        }

        /* Persistent HUD */
        #hud {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            pointer-events: none;
        }

        .stat-box { font-weight: bold; font-size: 1.2rem; pointer-events: auto; }
        #lives-display { color: var(--danger-color); }

        /* Game Screens */
        .screen {
            display: none;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
        }

        .active { display: flex; flex-direction: column; }

        /* Gameplay Layout */
        #game-canvas {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            height: 100%;
            padding-bottom: 50px;
            position: relative;
        }

        .lane {
            width: var(--lane-width);
            height: 70%;
            border: 2px solid #333;
            position: relative;
            display: flex;
            flex-direction: column-reverse;
            background: rgba(255,255,255,0.02);
        }

        .lane-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            opacity: 0.1;
            pointer-events: none;
        }

        .brick {
            width: 100%;
            height: 25px;
            background: #444;
            border: 1px solid #666;
            box-sizing: border-box;
        }

        #falling-block {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            background: var(--accent-color);
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            cursor: pointer;
            border-radius: 4px;
        }

        /* Shop Layout - Zelda Style */
        #shop-screen {
            background: #000;
            padding: 20px;
            justify-content: space-between;
        }

        #shopkeeper {
            text-align: center;
            padding: 20px;
        }

        #dialogue-box {
            min-height: 60px;
            border: 2px solid var(--text-color);
            padding: 15px;
            margin: 10px 0;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            overflow-y: auto;
            flex-grow: 1;
            padding: 10px;
        }

        .sticker-item {
            border: 1px solid #444;
            padding: 10px;
            text-align: center;
            cursor: pointer;
        }

        .sticker-item:hover { border-color: var(--accent-color); }

        .btn {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--text-color);
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
        }

        .btn:hover { background: var(--text-color); color: #000; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="stat-box">FLOOR: <span id="floor-display">1</span></div>
        <div class="stat-box">COINS: <span id="coin-display">0</span></div>
        <div class="stat-box" id="lives-display">❤❤❤</div>
    </div>

    <section id="game-screen" class="screen active">
        <div id="game-canvas">
            <div id="falling-block" onclick="playAudio()">?</div>
            <div class="lane" id="lane-L" onclick="handleSort('L')">
                <div class="lane-label">L</div>
            </div>
            <div class="lane" id="lane-R" onclick="handleSort('R')">
                <div class="lane-label">R</div>
            </div>
        </div>
        <div style="text-align:center; padding: 20px;">
            <button class="btn" onclick="switchScreen('shop-screen')">Visit Sound Smith</button>
        </div>
    </section>

    <section id="shop-screen" class="screen">
        <div id="shopkeeper">
            <div style="font-size: 3rem;">🧙‍♂️</div>
            <div id="dialogue-box"></div>
        </div>
        <div class="sticker-grid" id="sticker-grid">
            </div>
        <div style="padding: 20px; text-align: center;">
            <button class="btn" onclick="switchScreen('game-screen')">Return to Tower</button>
        </div>
    </section>

    <script>
        const state = {
            floor: 1,
            lives: 3,
            wallets: { 1: 0, 2: 0, 3: 0 },
            spending: { 1: 0, 2: 0, 3: 0 },
            sigils: { 1: false, 2: false, 3: false },
            currentWord: null,
            inventory: { 1: [], 2: [], 3: [] }
        };

        const floors = {
            1: { name: "L vs R", pairs: [["Light", "Right"], ["Glass", "Grass"], ["Collect", "Correct"]], type: "LR" },
            2: { name: "V vs B", pairs: [["Vest", "Best"], ["Van", "Ban"], ["Vat", "Bat"]], type: "VB" },
            3: { name: "Eat vs It", pairs: [["Seat", "Sit"], ["Peel", "Pill"], ["He'll", "Hill"]], type: "EI" }
        };

        const stickers = [
            { id: 's1', name: "Note", cost: 10 },
            { id: 's2', name: "Staff", cost: 25 },
            { id: 's3', name: "Clef", cost: 45 },
            { id: 'sigil', name: "LEVEL SIGIL", cost: 0, rare: true }
        ];

        // --- Core Logic ---

        function initGame() {
            spawnWord();
            updateHUD();
            typeDialogue("Welcome, traveler. Your ears must be sharp to climb the tower...");
        }

        function spawnWord() {
            const pairs = floors[state.floor].pairs;
            const pair = pairs[Math.floor(Math.random() * pairs.length)];
            state.currentWord = {
                text: pair[Math.floor(Math.random() * 2)],
                correctLane: '' // Determined by logic below
            };
            
            // Phonetic Logic
            const word = state.currentWord.text.toLowerCase();
            if(state.floor === 1) state.currentWord.correctLane = word.includes('l') ? 'L' : 'R';
            if(state.floor === 2) state.currentWord.correctLane = word.startsWith('v') ? 'L' : 'R';
            if(state.floor === 3) state.currentWord.correctLane = (word.includes('ee') || word.includes('ea')) ? 'L' : 'R';
            
            playAudio();
        }

        function playAudio() {
            const utterance = new SpeechSynthesisUtterance(state.currentWord.text);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        }

        function handleSort(lane) {
            if (lane === state.currentWord.correctLane) {
                addBrick(lane);
                state.wallets[state.floor] += 10;
            } else {
                state.lives--;
                if (state.lives <= 0) alert("Game Over. Refresh to restart.");
            }
            updateHUD();
            spawnWord();
        }

        function addBrick(lane) {
            const brick = document.createElement('div');
            brick.className = 'brick';
            document.getElementById(`lane-${lane}`).appendChild(brick);
        }

        // --- UI & Shop ---

        function updateHUD() {
            document.getElementById('floor-display').innerText = state.floor;
            document.getElementById('coin-display').innerText = state.wallets[state.floor];
            document.getElementById('lives-display').innerText = "❤".repeat(state.lives);
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            if(screenId === 'shop-screen') renderShop();
        }

        function renderShop() {
            const grid = document.getElementById('sticker-grid');
            grid.innerHTML = '';
            
            stickers.forEach(item => {
                // Only show Sigil if enough spent
                if(item.rare && state.spending[state.floor] < 500) return;
                
                const div = document.createElement('div');
                div.className = 'sticker-item';
                div.innerHTML = `<strong>${item.name}</strong><br>${item.rare ? 'TRADE' : item.cost + 'c'}`;
                div.onclick = () => buyItem(item);
                grid.appendChild(div);
            });
        }

        function buyItem(item) {
            const wallet = state.wallets[state.floor];
            
            if (item.rare) {
                state.floor++;
                state.lives = 3;
                typeDialogue("The path upward is revealed. Use the Sigil wisely...");
                setTimeout(() => switchScreen('game-screen'), 2000);
            } else if (wallet >= item.cost) {
                state.wallets[state.floor] -= item.cost;
                state.spending[state.floor] += item.cost;
                state.inventory[state.floor].push(item.name);
                typeDialogue(`Ah, the ${item.name}. A fine choice.`);
            } else {
                typeDialogue("You lack the coins for such treasures.");
            }
            updateHUD();
            renderShop();
        }

        function typeDialogue(text) {
            const box = document.getElementById('dialogue-box');
            box.innerText = '';
            let i = 0;
            const interval = setInterval(() => {
                box.innerText += text[i];
                i++;
                if (i >= text.length) clearInterval(interval);
            }, 30);
        }

        window.onload = initGame;
    </script>
</body>
</html>
