<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <title>Phonetic Flow v2.8.9</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --l-color: #2ecc71;
            --r-color: #e67e22;
            --accent: #f1c40f;
            --text-color: #ffffff;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background-color: var(--bg-color);
            font-family: var(--font-main);
            color: var(--text-color); user-select: none;
            touch-action: none;
        }

        #currency-display { 
            position: fixed; top: 20px; right: 20px; 
            font-size: 22px; color: var(--accent); 
            z-index: 500; font-weight: 900;
            background: rgba(0,0,0,0.8); padding: 8px 15px;
            border-radius: 20px; border: 2px solid var(--accent);
        }

        #lives-display { 
            position: fixed; top: 20px; left: 50%; 
            transform: translateX(-50%); font-size: 28px; 
            z-index: 500; 
        }

        #game-container { 
            position: relative; width: 100vw; height: 100vh; 
            display: flex; overflow: hidden; 
        }
        
        .bg-half { flex: 1; height: 100%; opacity: 0.1; pointer-events: none; }
        #l-bg { background-color: var(--l-color); border-right: 1px solid #333; }
        #r-bg { background-color: var(--r-color); }

        .lane-label {
            position: absolute; top: 12%; font-size: 130px; 
            font-weight: 900; color: var(--accent); 
            opacity: 0.15; z-index: 1; pointer-events: none;
        }
        #l-label { left: 8%; }
        #r-label { right: 8%; }

        /* THE STACK FIX: Anchored to bottom, grow upwards */
        .side-stack {
            position: absolute; 
            bottom: 0; 
            width: 45%; 
            max-height: 85vh; /* Prevents hitting the top UI */
            display: flex; 
            flex-direction: column-reverse; 
            pointer-events: none;
            z-index: 5;
            padding-bottom: 10px; /* Buffer from bottom edge */
        }
        #left-stack { left: 0; align-items: flex-start; padding-left: 15px; }
        #right-stack { right: 0; align-items: flex-end; padding-right: 15px; }

        /* REFINED BRICK SIZE */
        .brick {
            width: 140px; 
            height: 50px; 
            margin: 3px 0;
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px; 
            font-size: 24px; 
            font-weight: 800;
            color: white;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            text-shadow: 1px 1px 3px rgba(0,0,0,1);
            animation: popIn 0.2s ease-out;
            flex-shrink: 0; /* Prevents squishing when stack gets high */
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Falling Action Block */
        .block {
            position: absolute; 
            width: 120px; height: 120px;
            background-color: #2c3e50; border: 6px solid var(--accent);
            border-radius: 25px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 60px; z-index: 20;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); cursor: pointer;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 300; text-align: center; padding: 20px; box-sizing: border-box;
        }

        button {
            padding: 18px 25px; font-size: 20px; border-radius: 40px;
            border: none; background: #3498db; color: white; cursor: pointer;
            font-weight: 800; font-family: var(--font-main); margin: 8px;
        }

        .hidden { display: none !important; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-12px); }
            40%, 80% { transform: translateX(12px); }
        }
        .shake-ui { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body>

<div id="currency-display">💰 0</div>
<div id="lives-display">❤️❤️❤️</div>

<div id="game-container">
    <div id="l-bg" class="bg-half"></div>
    <div id="r-bg" class="bg-half"></div>
    <div id="l-label" class="lane-label">L</div>
    <div id="r-label" class="lane-label">R</div>
    <div id="left-stack" class="side-stack"></div>
    <div id="right-stack" class="side-stack"></div>
</div>

<div id="main-menu" class="overlay">
    <h1 style="color: var(--accent); font-size: 50px; margin-bottom: 15px; text-shadow: 2px 2px #000;">PHONETIC FLOW</h1>
    <p id="level-display-name" style="color: #ccc; margin-bottom: 25px; font-weight: bold; font-size: 22px;"></p>
    <button onclick="startGame()" style="background: var(--l-color); width: 280px; font-size: 26px;">START GAME</button>
    <button onclick="showMenu('shop-menu')" style="width: 280px;">STICKER SHOP</button>
    <button onclick="showMenu('sticker-book')" style="width: 280px;">COLLECTION</button>
</div>

<div id="pause-menu" class="overlay hidden">
    <div style="background: rgba(30, 39, 46, 1); padding: 35px; border-radius: 25px; border: 5px solid var(--accent); width: 85%;">
        <h2 style="color: var(--accent); font-size: 42px; margin-top: 0;">PAUSED</h2>
        <button onclick="buyHeart()" style="background: #e74c3c; width: 220px; font-size: 22px; margin-bottom: 20px;">❤️ BUY LIFE (75)</button>
        <div style="display: flex; justify-content: space-around; margin-bottom: 30px;">
            <button onclick="setSpeed(0.7)" style="font-size: 40px; background: #333;">🐢</button>
            <button onclick="setSpeed(1.0)" style="font-size: 40px; background: #333;">🧑</button>
            <button onclick="setSpeed(1.3)" style="font-size: 40px; background: #333;">⚡</button>
        </div>
        <button onclick="closeMenus()" style="background: var(--l-color); width: 100%; font-size: 24px;">RESUME</button>
    </div>
</div>

<div id="round-win" class="overlay hidden">
    <h1 style="color: var(--l-color); font-size: 55px;">LEVEL CLEAR</h1>
    <button onclick="showMenu('main-menu')" style="font-size: 28px; width: 220px;">CONTINUE</button>
</div>

<div id="game-over" class="overlay hidden">
    <h1 style="color: var(--r-color); font-size: 55px;">OUT OF LIVES</h1>
    <button onclick="startGame()" style="font-size: 26px; width: 200px;">RETRY</button>
    <button onclick="showMenu('main-menu')" style="background: #444; width: 200px;">EXIT</button>
</div>

<script>
    const levels = {
        1: { name: "L vs R Forest", labels: ["L", "R"], pairs: [
            {word:"Light",type:"L"},{word:"Right",type:"R"},{word:"Glass",type:"L"},{word:"Grass",type:"R"},
            {word:"Collect",type:"L"},{word:"Correct",type:"R"},{word:"Tall",type:"L"},{word:"Door",type:"R"},
            {word:"Play",type:"L"},{word:"Pray",type:"R"}
        ]}
    };

    let state = {
        curLevel: 1, speed: 1.0, lives: 3, 
        coins: {1:0}, inventory: [], roundHits: 0, isPaused: true
    };

    let currentBlock = null;
    let animationId = null;
    const synth = window.speechSynthesis;

    function speak(text) {
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.rate = 0.75;
        synth.speak(utter);
    }

    function showMenu(id) {
        state.isPaused = true;
        cleanup();
        document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
        const menu = document.getElementById(id);
        if(menu) menu.classList.remove('hidden');
        updateUI();
    }

    function updateUI() {
        document.getElementById('currency-display').innerText = `💰 ${state.coins[state.curLevel] || 0}`;
        document.getElementById('lives-display').innerText = "❤️".repeat(Math.max(0, state.lives));
        document.getElementById('level-display-name').innerText = levels[state.curLevel].name;
    }

    function buyHeart() {
        if (state.coins[state.curLevel] >= 75) {
            state.coins[state.curLevel] -= 75;
            state.lives++;
            updateUI();
        }
    }

    function startGame() {
        cleanup(); state.lives = 3; state.roundHits = 0;
        document.getElementById('left-stack').innerHTML = "";
        document.getElementById('right-stack').innerHTML = "";
        closeMenus();
    }

    function spawnBlock() {
        if (state.isPaused || state.lives <= 0 || state.roundHits >= 15) return;
        const pair = levels[state.curLevel].pairs[Math.floor(Math.random() * levels[state.curLevel].pairs.length)];
        speak(pair.word);
        
        const el = document.createElement('div');
        el.className = 'block'; el.innerText = "?";
        el.style.left = "calc(50% - 60px)"; el.style.top = "0px";
        el.addEventListener('pointerdown', (e) => { e.stopPropagation(); showMenu('pause-menu'); });
        
        document.getElementById('game-container').appendChild(el);
        currentBlock = { element: el, data: pair, top: 0 };
        animate();
    }

    function animate() {
        if (state.isPaused || !currentBlock) return;
        currentBlock.top += (2.2 * state.speed);
        currentBlock.element.style.top = currentBlock.top + "px";
        
        // Resolve if it hits the bottom UI or the top of the stack area
        if (currentBlock.top > window.innerHeight - 150) resolve(null);
        else animationId = requestAnimationFrame(animate);
    }

    window.addEventListener('pointerdown', (e) => {
        if (state.isPaused || !currentBlock || e.target.closest('.block')) return;
        resolve(e.clientX < window.innerWidth / 2 ? "L" : "R");
    });

    function resolve(choice) {
        if (!currentBlock) return;
        const isCorrect = choice === currentBlock.data.type;
        const brick = document.createElement('div');
        brick.className = 'brick'; brick.innerText = currentBlock.data.word;
        brick.style.background = isCorrect ? 'var(--l-color)' : 'var(--r-color)';
        
        const targetId = choice === 'L' ? 'left-stack' : (choice === 'R' ? 'right-stack' : (currentBlock.data.type === 'L' ? 'right-stack' : 'left-stack'));
        document.getElementById(targetId).appendChild(brick);

        if (isCorrect) { 
            state.roundHits++; 
            state.coins[state.curLevel] = (state.coins[state.curLevel] || 0) + 10; 
        } else { 
            state.lives--; 
            document.getElementById('lives-display').classList.add('shake-ui');
            setTimeout(() => document.getElementById('lives-display').classList.remove('shake-ui'), 300);
            if(state.lives <= 0) return showMenu('game-over'); 
        }
        cleanup(); updateUI();
        if(state.roundHits >= 15) setTimeout(() => showMenu('round-win'), 500);
        else setTimeout(spawnBlock, 400);
    }

    function cleanup() { if(currentBlock) currentBlock.element.remove(); currentBlock = null; cancelAnimationFrame(animationId); }
    function closeMenus() { document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden')); state.isPaused = false; spawnBlock(); }
    function setSpeed(s) { state.speed = s; updateUI(); }

    updateUI();
</script>
</body>
</html>
