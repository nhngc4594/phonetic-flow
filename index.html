<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <title>Phonetic Flow v2.9.0</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --l-color: #2ecc71;
            --r-color: #e67e22;
            --ui-bg: rgba(30, 39, 46, 0.4);
            --accent: #f1c40f;
            --text-color: #ffffff;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --font-retro: 'Courier New', Courier, monospace;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background-color: var(--bg-color);
            font-family: var(--font-main);
            color: var(--text-color); user-select: none;
            touch-action: none;
        }

        #currency-display { 
            position: fixed; top: 20px; right: 20px; 
            font-size: 24px; color: var(--accent); 
            z-index: 500; font-weight: 900;
            background: rgba(0,0,0,0.7); padding: 8px 15px;
            border-radius: 20px; border: 2px solid var(--accent);
        }
        #lives-display { 
            position: fixed; top: 20px; left: 50%; 
            transform: translateX(-50%); font-size: 26px; 
            z-index: 500; 
        }

        #game-container { 
            position: relative; width: 100vw; height: 100vh; 
            display: flex; overflow: hidden; 
        }
        
        .bg-half { flex: 1; height: 100%; opacity: 0.12; pointer-events: none; }
        #l-bg { background-color: var(--l-color); border-right: 1px solid #333; }
        #r-bg { background-color: var(--r-color); }

        .lane-label {
            position: absolute; bottom: 100px; font-size: 120px; font-weight: 900;
            color: var(--accent); opacity: 0.2; z-index: 2; pointer-events: none;
        }
        #l-label { left: 10%; }
        #r-label { right: 10%; }

        .side-stack {
            position: absolute; bottom: 80px; width: 160px; height: auto;
            display: flex; flex-direction: column-reverse; z-index: 10;
            padding: 10px; box-sizing: border-box; pointer-events: none;
        }
        #left-stack { left: 0; align-items: flex-start; }
        #right-stack { right: 0; align-items: flex-end; }
        
        .brick {
            width: 130px; height: 35px; margin-bottom: 4px;
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: bold; color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            animation: slideIn 0.2s ease-out; flex-shrink: 0;
        }

        .block {
            position: absolute; 
            width: 120px; height: 120px;
            background-color: #34495e; border: 4px solid var(--accent);
            border-radius: 24px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 40px; z-index: 20;
            box-shadow: 0 12px 35px rgba(0,0,0,0.8); cursor: pointer;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 300; text-align: center; padding: 20px; box-sizing: border-box;
        }

        #shopkeeper-area {
            background: #000; border: 3px solid #fff; border-radius: 10px;
            width: 100%; min-height: 120px; margin-bottom: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 10px; box-sizing: border-box; 
            font-family: var(--font-retro);
        }

        .item-card {
            background: transparent;
            display: flex; flex-direction: column; align-items: center;
            padding: 10px;
        }

        .item-card div { font-size: 55px; margin-bottom: 5px; }

        .book-sticker {
            font-size: 70px;
            filter: drop-shadow(0 0 12px rgba(241, 196, 15, 0.7));
            transition: transform 0.3s;
        }

        button {
            padding: 12px 20px; font-size: 16px; border-radius: 40px;
            border: none; background: #3498db; color: white; cursor: pointer;
            font-weight: bold; font-family: var(--font-main); margin: 6px;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        button:disabled { background: #444; color: #888; transform: none; }
        .active-yellow { background: var(--accent) !important; color: #000 !important; }

        /* Voice selector panel */
        #voice-panel {
            width: 100%; max-width: 320px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 14px 16px;
            box-sizing: border-box;
            margin: 10px 0 4px;
        }
        #voice-panel label {
            display: block;
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }
        #voice-panel .voice-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #voice-select {
            flex: 1;
            background: rgba(0,0,0,0.4);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 13px;
            font-family: var(--font-main);
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
        }
        #voice-select option { background: #1e272e; color: #fff; }
        #btn-test-voice {
            background: rgba(241,196,15,0.15);
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 13px;
            margin: 0;
            white-space: nowrap;
        }
        #btn-test-voice:active { transform: scale(0.95); }
        #voice-status {
            font-size: 11px;
            color: rgba(255,255,255,0.35);
            margin-top: 7px;
            min-height: 14px;
        }

        .tower-item {
            background: #222; width: 85%; margin: 6px; padding: 15px;
            border-radius: 12px; border: 2px solid #444; transition: 0.3s;
        }

        .hidden { display: none !important; }

        @keyframes goldSparkle {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.3); filter: brightness(1.5) drop-shadow(0 0 20px #f1c40f); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .purchased-anim { animation: goldSparkle 0.6s ease; }
    </style>
</head>
<body>

<div id="currency-display">💰 0</div>
<div id="lives-display">❤️❤️❤️</div>

<div id="game-container">
    <div id="l-bg" class="bg-half"></div>
    <div id="r-bg" class="bg-half"></div>
    <div id="l-label" class="lane-label">L</div>
    <div id="r-label" class="lane-label">R</div>
    <div id="left-stack" class="side-stack"></div>
    <div id="right-stack" class="side-stack"></div>
</div>

<div id="main-menu" class="overlay">
    <h1 style="color: var(--accent); font-size: 42px; margin-bottom: 4px;">PHONETIC FLOW</h1>
    <p id="level-display-name" style="color: #aaa; margin-bottom: 16px; font-weight: bold;"></p>

    <!-- Voice selector panel -->
    <div id="voice-panel">
        <label>🔊 Voice</label>
        <div class="voice-row">
            <select id="voice-select" onchange="onVoiceChange()">
                <option value="">Loading voices…</option>
            </select>
            <button id="btn-test-voice" onclick="testVoice()">Test</button>
        </div>
        <div id="voice-status"></div>
    </div>

    <button onclick="startGame()" style="background: var(--l-color); width: 220px; font-size: 20px; margin-top: 14px;">START</button>
    <button id="btn-world-map" onclick="showMenu('level-select')" style="width: 220px;" class="hidden">WORLD MAP</button>
    <button onclick="showMenu('shop-menu')" style="width: 220px;">STICKER SHOP</button>
    <button onclick="showMenu('sticker-book')" style="width: 220px;">MY BOOK</button>
</div>

<div id="level-select" class="overlay hidden">
    <h2 style="color: var(--accent)">ASCENDING TOWER</h2>
    <div id="tower-list" style="display: flex; flex-direction: column-reverse; width: 100%; align-items: center;"></div>
    <button onclick="showMenu('main-menu')" style="background: #444; width: 200px; margin-top: 20px;">BACK</button>
</div>

<div id="shop-menu" class="overlay hidden">
    <div id="shopkeeper-area">
        <div style="font-size: 50px;">🧙‍♂️</div>
        <div id="shopkeeper-text" style="font-weight: bold; text-transform: uppercase;"></div>
    </div>
    <div id="shop-items-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; overflow-y: auto;"></div>
    <div id="trade-ui" class="hidden">
        <div id="trade-options" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>
    </div>
    <button onclick="showMenu('main-menu')" style="background: #2980b9; width: 100%; margin-top: 15px;">BACK</button>
</div>

<div id="sticker-book" class="overlay hidden" style="display: flex; flex-direction: column;">
    <h2 style="margin-top: 40px; color: var(--accent); flex-shrink: 0;">COLLECTION</h2>
    <div id="book-display" style="
        flex-grow: 1; overflow-y: auto; width: 100%; padding: 20px; box-sizing: border-box;
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; 
        justify-items: center; align-content: start;
    "></div>
    <button onclick="showMenu('main-menu')" style="background: #444; width: 200px; margin: 20px 0; flex-shrink: 0;">BACK</button>
</div>

<div id="pause-menu" class="overlay hidden">
    <div style="background: rgba(30, 39, 46, 0.95); padding: 30px; border-radius: 24px; border: 2px solid var(--accent); width: 85%;">
        <h2 style="color: var(--accent);">PAUSED</h2>
        <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; margin-bottom: 20px;">
            <p style="margin: 0 0 10px 0; font-weight: bold;">NEED A LIFE?</p>
            <button onclick="buyHeart()" style="background: #e74c3c; width: 150px;">❤️ BUY (💰75)</button>
        </div>
        <div style="display: flex; justify-content: space-around; margin-bottom: 25px;">
            <button id="speed-0.7" onclick="setSpeed(0.7)" style="font-size: 25px; background: #444;">🐢</button>
            <button id="speed-1.0" onclick="setSpeed(1.0)" style="font-size: 25px; background: #444;">🧑</button>
            <button id="speed-1.3" onclick="setSpeed(1.3)" style="font-size: 25px; background: #444;">⚡</button>
        </div>
        <button onclick="closeMenus()" style="background: var(--l-color); width: 100%; margin-bottom: 10px;">RESUME</button>
        <button onclick="location.reload()" style="background: #444; width: 100%;">EXIT</button>
    </div>
</div>

<div id="round-win" class="overlay hidden">
    <h1 style="color: var(--l-color);">CLEAR!</h1>
    <p>Floor Bonus: 💰 +50</p>
    <button onclick="showMenu('main-menu')">CONTINUE</button>
</div>

<div id="game-over" class="overlay hidden">
    <h1 style="color: var(--r-color);">GAME OVER</h1>
    <button onclick="startGame()">RETRY</button>
    <button onclick="showMenu('main-menu')" style="background: #444;">EXIT</button>
</div>

<script>
    const levels = {
        1: { name: "L vs R Forest", sigil: "🌲", pairs: [
            {word:"Light",type:"L"},{word:"Right",type:"R"},{word:"Glass",type:"L"},{word:"Grass",type:"R"},
            {word:"Collect",type:"L"},{word:"Correct",type:"R"},{word:"Tall",type:"L"},{word:"Door",type:"R"},
            {word:"Play",type:"L"},{word:"Pray",type:"R"}
        ], stickers: [
            {emoji:"☁️", price:50}, {emoji:"🌱", price:100}, {emoji:"🌲", price:200}, {emoji:"🦅", price:300}, {emoji:"💎", price:500}
        ]},
        2: { name: "V vs B Valley", sigil: "🌊", pairs: [
            {word:"Vest",type:"L"},{word:"Best",type:"R"},{word:"Vote",type:"L"},{word:"Boat",type:"R"},
            {word:"Van",type:"L"},{word:"Ban",type:"R"},{word:"Vase",type:"L"},{word:"Base",type:"R"}
        ], stickers: [
            {emoji:"💧", price:50}, {emoji:"🐚", price:100}, {emoji:"🦀", price:200}, {emoji:"🦈", price:300}, {emoji:"🔱", price:500}
        ]},
        3: { name: "Eat vs It Peak", sigil: "🏔️", pairs: [
            {word:"Eat",type:"L"},{word:"It",type:"R"},{word:"Seat",type:"L"},{word:"Sit",type:"R"}
        ], stickers: [
            {emoji:"❄️", price:50}, {emoji:"🧤", price:100}, {emoji:"⛺", price:200}, {emoji:"🎿", price:300}, {emoji:"🗻", price:500}
        ]}
    };

    let state = {
        curLevel: 1, maxLevel: 1, speed: 1.0, lives: 3, 
        coins: {1:0, 2:0, 3:0}, invest: {1:0, 2:0, 3:0}, 
        inventory: [], roundHits: 0, isPaused: true,
        savedVoiceName: ""
    };

    let currentBlock = null;
    let animationId = null;
    let typeInterval = null;
    let selectedVoice = null;
    const synth = window.speechSynthesis;

    // --- PREFERRED VOICES (ordered by quality preference) ---
    const preferredVoiceNames = [
        "Google UK English Female",
        "Google US English",
        "Microsoft Zira - English (United States)",
        "Microsoft Zira",
        "Samantha",
        "Karen",
        "Victoria",
        "Moira",
    ];

    // --- VOICE MANAGEMENT ---
    function populateVoiceList() {
        const voices = synth.getVoices();
        const select = document.getElementById('voice-select');
        const status = document.getElementById('voice-status');

        // Filter to English voices only
        const englishVoices = voices.filter(v => v.lang.startsWith('en'));

        if (englishVoices.length === 0) {
            status.textContent = "No voices loaded yet — try again in a moment.";
            return;
        }

        select.innerHTML = "";

        // Sort: preferred voices first, then alphabetically
        englishVoices.sort((a, b) => {
            const ai = preferredVoiceNames.indexOf(a.name);
            const bi = preferredVoiceNames.indexOf(b.name);
            if (ai !== -1 && bi !== -1) return ai - bi;
            if (ai !== -1) return -1;
            if (bi !== -1) return 1;
            return a.name.localeCompare(b.name);
        });

        englishVoices.forEach(v => {
            const opt = document.createElement('option');
            opt.value = v.name;
            // Show a star next to preferred voices
            const isPreferred = preferredVoiceNames.includes(v.name);
            opt.textContent = (isPreferred ? "★ " : "") + v.name;
            select.appendChild(opt);
        });

        // Restore saved voice, or auto-pick best available
        const savedName = state.savedVoiceName;
        if (savedName && englishVoices.find(v => v.name === savedName)) {
            select.value = savedName;
        } else {
            const best = preferredVoiceNames.reduce(
                (found, name) => found || englishVoices.find(v => v.name === name), null
            );
            if (best) select.value = best.name;
        }

        applySelectedVoice();
        status.textContent = `${englishVoices.length} English voice${englishVoices.length !== 1 ? 's' : ''} available`;
    }

    function applySelectedVoice() {
        const voices = synth.getVoices();
        const name = document.getElementById('voice-select').value;
        selectedVoice = voices.find(v => v.name === name) || null;
        state.savedVoiceName = name;
        saveGame();
    }

    function onVoiceChange() {
        applySelectedVoice();
    }

    function testVoice() {
        const btn = document.getElementById('btn-test-voice');
        const status = document.getElementById('voice-status');
        const voices = synth.getVoices();

        // If voices aren't loaded yet, try to reload the list
        if (voices.length === 0) {
            status.textContent = "Still loading — please wait a moment.";
            return;
        }

        // Repopulate in case voices loaded after page start
        populateVoiceList();

        btn.textContent = "…";
        btn.disabled = true;

        speak("Light. Right. Glass. Grass.", () => {
            btn.textContent = "Test";
            btn.disabled = false;
        });
    }

    // --- CORE ENGINE ---
    function speak(text, callback) {
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.rate = 0.8;
        if (selectedVoice) utter.voice = selectedVoice;
        utter.onend = () => { if (callback) callback(); };
        synth.speak(utter);
    }

    function saveGame() { localStorage.setItem('phoneticFlowSave', JSON.stringify(state)); }
    function loadGame() {
        const saved = localStorage.getItem('phoneticFlowSave');
        if (saved) { state = { ...state, ...JSON.parse(saved) }; }
        updateUI();
    }

    function typeWriter(text) {
        clearInterval(typeInterval);
        const el = document.getElementById('shopkeeper-text');
        el.innerHTML = ""; let i = 0;
        typeInterval = setInterval(() => {
            el.innerHTML += text.charAt(i); i++;
            if (i >= text.length) clearInterval(typeInterval);
        }, 40);
    }

    function showMenu(id) {
        state.isPaused = true;
        cancelAnimationFrame(animationId);
        document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'shop-menu') renderShop();
        if(id === 'level-select') renderTower();
        if(id === 'sticker-book') renderBook();
        if(id === 'main-menu') populateVoiceList();
        updateUI();
    }

    function updateUI() {
        document.getElementById('currency-display').innerText = `💰 ${state.coins[state.curLevel]}`;
        document.getElementById('lives-display').innerText = "❤️".repeat(Math.max(0, state.lives));
        document.getElementById('level-display-name').innerText = levels[state.curLevel].name;
        if(state.maxLevel >= 2) document.getElementById('btn-world-map').classList.remove('hidden');
        
        document.querySelectorAll('#pause-menu button').forEach(b => b.classList.remove('active-yellow'));
        const btn = document.getElementById(`speed-${state.speed.toFixed(1)}`);
        if(btn) btn.classList.add('active-yellow');
        saveGame();
    }

    // --- SHOP LOGIC ---
    function buyHeart() {
        const cost = 75;
        if (state.coins[state.curLevel] >= cost) {
            state.coins[state.curLevel] -= cost;
            state.lives++;
            updateUI();
            if(!document.getElementById('shop-menu').classList.contains('hidden')) {
                typeWriter("A FRESH HEART! STAY STRONG.");
            }
        } else {
            if(!document.getElementById('shop-menu').classList.contains('hidden')) {
                typeWriter("NOT ENOUGH COINS FOR A HEART!");
            }
        }
    }

    function buyItem(emoji, price, idx) {
        if (state.coins[state.curLevel] >= price) {
            const card = document.getElementById(`shop-item-${idx}`);
            if(card) card.classList.add('purchased-anim');
            state.coins[state.curLevel] -= price;
            state.invest[state.curLevel] += price;
            state.inventory.push({emoji, level: state.curLevel});
            setTimeout(() => { renderShop(); updateUI(); }, 600);
        } else {
            typeWriter("NOT ENOUGH COINS! PLAY MORE!");
        }
    }

    function renderShop() {
        const inv = state.invest[state.curLevel];
        const grid = document.getElementById('shop-items-grid');
        const trade = document.getElementById('trade-ui');
        grid.innerHTML = ""; grid.classList.remove('hidden'); trade.classList.add('hidden');

        if (inv >= 500 && !hasSigil(state.curLevel)) {
            typeWriter("YOU ARE READY. TRADE A RARE STICKER FOR THE MAGIC ITEM?");
            grid.classList.add('hidden'); trade.classList.remove('hidden');
            const opts = document.getElementById('trade-options'); opts.innerHTML = "";
            const unique = [...new Set(state.inventory.filter(i => i.level === state.curLevel).map(i => i.emoji))];
            unique.forEach(emo => {
                const b = document.createElement('button'); b.innerText = emo;
                b.style.fontSize = "30px";
                b.onclick = () => processTrade(emo); opts.appendChild(b);
            });
        } else {
            typeWriter("WELCOME! FLOOR " + state.curLevel + " SHOP. BUY STICKERS!");
            
            const heartCard = document.createElement('div');
            heartCard.className = "item-card";
            heartCard.innerHTML = `<div>❤️</div><button onclick="buyHeart()">💰75</button>`;
            grid.appendChild(heartCard);

            levels[state.curLevel].stickers.forEach((item, idx) => {
                const count = state.inventory.filter(i => i.emoji === item.emoji).length;
                const stockText = count === 0 ? "2X" : (count === 1 ? "1X" : "SOLD");
                const card = document.createElement('div');
                card.className = "item-card"; card.id = `shop-item-${idx}`;
                card.innerHTML = `<div>${item.emoji}</div>
                                  <button onclick="buyItem('${item.emoji}', ${item.price}, ${idx})" ${count >= 2 ? 'disabled' : ''}>
                                  ${stockText}: 💰${item.price}</button>`;
                grid.appendChild(card);
            });
        }
    }

    function processTrade(emoji) {
        const stickerRef = levels[state.curLevel].stickers.find(s => s.emoji === emoji);
        if(!stickerRef || stickerRef.price <= 50) { 
            typeWriter("NO. THAT IS TOO COMMON. GIVE ME A RARE STICKER."); 
            return; 
        }
        const idx = state.inventory.findIndex(i => i.emoji === emoji);
        state.inventory.splice(idx, 1);
        state.inventory.push({emoji: levels[state.curLevel].sigil, level: state.curLevel, isSigil: true});
        state.maxLevel = Math.max(state.maxLevel, state.curLevel + 1);
        typeWriter("THANK YOU! THE NEXT FLOOR IS OPEN.");
        setTimeout(() => showMenu('main-menu'), 2000);
    }

    function hasSigil(lvl) { return state.inventory.some(i => i.level === lvl && i.isSigil); }

    // --- GAMEPLAY LOOP ---
    function startGame() {
        cleanup(); state.lives = 3; state.roundHits = 0;
        document.getElementById('left-stack').innerHTML = "";
        document.getElementById('right-stack').innerHTML = "";
        closeMenus();
    }

    function spawnBlock() {
        if (state.isPaused || state.lives <= 0 || state.roundHits >= 15) return;
        const pool = levels[state.curLevel].pairs;
        const pair = pool[Math.floor(Math.random() * pool.length)];
        speak(pair.word);
        if(currentBlock) return;
        const el = document.createElement('div');
        el.className = 'block'; 
        el.innerText = "?";
        el.style.left = "calc(50% - 60px)"; 
        el.style.top = "0px";
        el.addEventListener('pointerdown', (e) => { 
            e.stopPropagation(); 
            showMenu('pause-menu'); 
        });
        document.getElementById('game-container').appendChild(el);
        currentBlock = { element: el, data: pair, top: 0 };
        animate();
    }

    function animate() {
        if (state.isPaused || !currentBlock) return;
        currentBlock.top += (2.2 * state.speed);
        currentBlock.element.style.top = currentBlock.top + "px";
        if (currentBlock.top > window.innerHeight - 120) resolve(null);
        else animationId = requestAnimationFrame(animate);
    }

    window.addEventListener('pointerdown', (e) => {
        if (state.isPaused || !currentBlock || e.target.closest('.block')) return;
        resolve(e.clientX < window.innerWidth / 2 ? "L" : "R");
    });

    function resolve(choice) {
        if (!currentBlock) return;
        const isCorrect = choice === currentBlock.data.type;
        const brick = document.createElement('div');
        brick.className = 'brick'; brick.innerText = currentBlock.data.word;
        brick.style.background = isCorrect ? 'var(--l-color)' : 'var(--r-color)';
        const target = (choice === 'L' || (!choice && currentBlock.data.type === 'R')) ? 'left-stack' : 'right-stack';
        document.getElementById(target).appendChild(brick);
        if (isCorrect) { state.roundHits++; state.coins[state.curLevel] += 10; }
        else { state.lives--; if(state.lives <= 0) return showMenu('game-over'); }
        cleanup(); updateUI();
        if(state.roundHits >= 15) { state.coins[state.curLevel] += 50; setTimeout(() => showMenu('round-win'), 500); }
        else setTimeout(spawnBlock, 400);
    }

    function cleanup() { if(currentBlock) currentBlock.element.remove(); currentBlock = null; cancelAnimationFrame(animationId); }
    function closeMenus() { 
        document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden')); 
        state.isPaused = false; 
        if(!currentBlock && state.roundHits < 15) spawnBlock(); 
        else if (currentBlock) { speak(currentBlock.data.word); animate(); }
    }

    function setSpeed(s) { state.speed = s; updateUI(); }

    function renderTower() {
        const list = document.getElementById('tower-list'); list.innerHTML = "";
        for(let i=1; i<=3; i++) {
            const div = document.createElement('div');
            const isLocked = i > state.maxLevel;
            div.className = "tower-item";
            if (i === state.curLevel) { div.style.borderColor = "var(--accent)"; div.style.boxShadow = "0 0 15px var(--accent)"; }
            div.style.opacity = isLocked ? "0.4" : "1";
            let status = isLocked ? '🔒' : (hasSigil(i) ? `<span style="float:right">${levels[i].sigil}</span>` : '');
            div.innerHTML = `Floor ${i}: ${levels[i].name} ${status}`;
            if(!isLocked) div.onclick = () => { state.curLevel = i; updateUI(); renderTower(); };
            list.appendChild(div);
        }
    }

    function renderBook() {
        const b = document.getElementById('book-display');
        b.innerHTML = "";
        if(state.inventory.length === 0) { b.innerHTML = "<p>BOOK IS EMPTY</p>"; return; }
        state.inventory.forEach(i => {
            const d = document.createElement('div');
            d.className = "book-sticker";
            d.innerText = i.emoji;
            if (i.isSigil) d.style.filter = "drop-shadow(0 0 20px #f1c40f)";
            b.appendChild(d);
        });
    }

    // --- INIT ---
    // Voices load asynchronously in most browsers
    synth.onvoiceschanged = populateVoiceList;
    // Also try immediately (works in Firefox and some others)
    populateVoiceList();

    loadGame();
</script>
</body>
</html>
