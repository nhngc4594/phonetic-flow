<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <title>Phonetic Flow v2.6.2</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --l-color: #2ecc71;
            --r-color: #e67e22;
            --ui-bg: rgba(30, 39, 46, 0.4); /* High Translucency */
            --accent: #f1c40f;
            --text-color: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--text-color); user-select: none;
            touch-action: none;
        }

        #game-container { 
            position: relative; width: 100vw; height: 100vh; 
            display: flex; overflow: hidden; 
            padding-bottom: env(safe-area-inset-bottom);
            box-sizing: border-box;
        }
        
        .bg-half { flex: 1; height: 100%; opacity: 0.12; pointer-events: none; }
        #l-bg { background-color: var(--l-color); border-right: 1px solid #333; }
        #r-bg { background-color: var(--r-color); }

        .side-stack {
            position: absolute; bottom: 80px; width: 160px; height: auto;
            display: flex; flex-direction: column-reverse; z-index: 5;
            padding: 10px; box-sizing: border-box; pointer-events: none;
        }
        #left-stack { left: 0; align-items: flex-start; }
        #right-stack { right: 0; align-items: flex-end; }
        
        .brick {
            width: 130px; height: 35px; margin-bottom: 4px;
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: bold; color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            animation: slideIn 0.2s ease-out; flex-shrink: 0;
        }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Enhanced Star Burst Animation */
        @keyframes starBurst {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.15); filter: brightness(1.8) drop-shadow(0 0 20px var(--accent)); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .purchased-anim { animation: starBurst 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .lane-label {
            position: absolute; bottom: 100px; font-size: 120px; font-weight: 900;
            color: var(--accent); opacity: 0.15; z-index: 1; pointer-events: none;
        }
        #l-label { left: 10%; }
        #r-label { right: 10%; }

        .block {
            position: absolute; width: 100px; height: 100px;
            background-color: #34495e; border: 4px solid var(--accent);
            border-radius: 24px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 32px; z-index: 10;
            box-shadow: 0 12px 35px rgba(0,0,0,0.8); cursor: pointer;
            touch-action: none;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 300; text-align: center; padding: 20px; box-sizing: border-box;
        }

        /* Optimized See-through Pause Popup */
        .popup-modal {
            background: rgba(30, 39, 46, 0.6); /* Reduced alpha for visibility */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(241, 196, 15, 0.5);
            border-radius: 30px;
            padding: 30px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            z-index: 400;
        }

        .hidden { display: none !important; }

        button {
            padding: 16px 32px; font-size: 18px; border-radius: 40px;
            border: none; background: #3498db; color: white; cursor: pointer;
            margin: 10px; font-weight: bold; transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        .active-yellow { background: var(--accent) !important; color: #000 !important; }
        
        #lives-display { position: fixed; top: calc(20px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); font-size: 26px; z-index: 150; }
        #score-display { position: fixed; bottom: calc(10px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); font-size: 14px; opacity: 0.6; z-index: 150; }

        .shop-container {
            width: 100%; flex-grow: 1; overflow-y: auto;
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 15px; padding: 20px; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div id="lives-display">❤️❤️❤️</div>
<div id="score-display">Progress: <span id="round-hits">0</span>/10</div>

<div id="game-container">
    <div id="l-bg" class="bg-half"></div>
    <div id="r-bg" class="bg-half"></div>
    <div id="l-label" class="lane-label">L</div>
    <div id="r-label" class="lane-label">R</div>
    <div id="left-stack" class="side-stack"></div>
    <div id="right-stack" class="side-stack"></div>
</div>

<div id="main-menu" class="overlay">
    <h1 style="color: var(--accent); font-size: 3.5rem; margin:0; letter-spacing: -2px;">PHONETIC FLOW</h1>
    <p id="menu-coin-text" style="font-size: 1.5rem; margin:10px 0;">💰 0</p>
    <button onclick="startGame()" style="font-size: 1.8rem; background: var(--l-color); padding: 20px 60px;">START</button>
    <button onclick="showMenu('sticker-book')">MY STICKERS</button>
    <button onclick="showMenu('shop-menu')">STICKER SHOP</button>
</div>

<div id="pause-menu" class="overlay hidden" style="background: rgba(0,0,0,0.2);">
    <div class="popup-modal">
        <h2 style="color: var(--accent); margin-top:0;">PAUSED</h2>
        <div style="margin: 20px 0;">
            <p style="opacity:0.7; font-size: 14px; margin-bottom: 5px;">VOICE SPEED</p>
            <div style="display: flex; justify-content: center;">
                <button id="speed-0.7" onclick="setSpeed(0.7)" style="padding: 12px;">🐢</button>
                <button id="speed-1.0" onclick="setSpeed(1.0)" style="padding: 12px;">🧑</button>
                <button id="speed-1.3" onclick="setSpeed(1.3)" style="padding: 12px;">⚡</button>
            </div>
        </div>
        <button onclick="closeMenus()" style="background: var(--l-color); width: 85%;">RESUME</button>
        <button onclick="location.reload()" style="background: #444; width: 85%;">EXIT</button>
    </div>
</div>

<div id="shop-menu" class="overlay hidden">
    <h2>STICKER SHOP</h2>
    <p>Available: 💰 <span id="shop-coins">0</span></p>
    <div id="shop-display" class="shop-container"></div>
    <button onclick="showMenu('main-menu')" style="width: 80%; background: #444;">BACK</button>
</div>

<div id="sticker-book" class="overlay hidden">
    <h2>MY STICKERS</h2>
    <div id="book-display" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; margin:20px;"></div>
    <button onclick="showMenu('main-menu')">BACK</button>
</div>

<div id="game-over" class="overlay hidden">
    <h1 style="color: var(--r-color); font-size: 3rem;">GAME OVER</h1>
    <button onclick="startGame()" style="background: var(--l-color);">TRY AGAIN</button>
    <button onclick="showMenu('main-menu')" style="background: #444;">MAIN MENU</button>
</div>

<div id="round-win" class="overlay hidden">
    <h1 style="color: var(--l-color); font-size: 3rem;">ROUND CLEAR!</h1>
    <p>Bonus: 💰 +50 Coins</p>
    <button onclick="showMenu('main-menu')">AWESOME</button>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    const pairs = [
        { word: "Light", type: "L" }, { word: "Right", type: "R" },
        { word: "Climb", type: "L" }, { word: "Crime", type: "R" },
        { word: "Glass", type: "L" }, { word: "Grass", type: "R" },
        { word: "Collect", type: "L" }, { word: "Correct", type: "R" },
        { word: "Lane", type: "L" }, { word: "Rain", type: "R" }
    ];

    const shopItems = [
        { emoji: "❤️", price: 150, type: 'life' },
        { emoji: "🏆", price: 50 }, { emoji: "🦅", price: 100 },
        { emoji: "🚀", price: 200 }, { emoji: "🍣", price: 250 },
        { emoji: "🎸", price: 300 }, { emoji: "💎", price: 500 }
    ];

    let state = {
        coins: 0, lives: 3, unlocked: [], 
        speed: 1.0, isPaused: true,
        roundHits: 0, totalCorrect: 0
    };

    let currentBlock = null;
    let animationId = null;
    const synth = window.speechSynthesis;

    function setSpeed(s) {
        state.speed = parseFloat(s);
        document.querySelectorAll('.popup-modal button').forEach(b => b.classList.remove('active-yellow'));
        const btn = document.getElementById(`speed-${s.toFixed(1)}`);
        if(btn) btn.classList.add('active-yellow');
    }

    function speak(text, callback) {
        synth.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        u.rate = state.speed;
        if(callback) u.onstart = callback;
        synth.speak(u);
    }

    function showMenu(id) {
        state.isPaused = true;
        cancelAnimationFrame(animationId);
        document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'shop-menu') renderShop();
        if(id === 'sticker-book') renderBook();
        updateUI();
    }

    function closeMenus() {
        document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
        state.isPaused = false;
        if (!currentBlock && state.roundHits < 10) spawnBlock();
        else animate();
    }

    function startGame() {
        cleanup();
        state.lives = 3;
        state.roundHits = 0;
        document.getElementById('left-stack').innerHTML = '';
        document.getElementById('right-stack').innerHTML = '';
        updateUI();
        closeMenus();
    }

    function spawnBlock() {
        if (state.isPaused || state.lives <= 0 || state.roundHits >= 10) return;
        const pair = pairs[Math.floor(Math.random() * pairs.length)];
        
        speak(pair.word, () => {
            if(state.isPaused || currentBlock) return; 
            const el = document.createElement('div');
            el.className = 'block';
            el.innerText = "?";
            el.style.left = "calc(50% - 50px)";
            el.style.top = "0px";
            el.addEventListener('pointerdown', (e) => {
                e.stopPropagation();
                showMenu('pause-menu');
            });
            document.getElementById('game-container').appendChild(el);
            currentBlock = { element: el, data: pair, top: 0 };
            animate();
        });
    }

    function animate() {
        if (state.isPaused || !currentBlock) return;
        currentBlock.top += (2.2 * state.speed);
        currentBlock.element.style.top = currentBlock.top + "px";
        if (currentBlock.top > window.innerHeight - 120) resolve(null);
        else animationId = requestAnimationFrame(animate);
    }

    window.addEventListener('pointerdown', (e) => {
        if (state.isPaused || !currentBlock || e.target.closest('.block')) return;
        resolve(e.clientX < window.innerWidth / 2 ? "L" : "R");
    });

    function resolve(choice) {
        if (!currentBlock) return;
        const data = currentBlock.data;
        const isCorrect = choice === data.type;
        
        const brick = document.createElement('div');
        brick.className = 'brick';
        brick.innerText = data.word;
        brick.style.background = isCorrect ? 'var(--l-color)' : 'var(--r-color)';
        
        const stackId = (choice || (data.type === 'L' ? 'R' : 'L')) === 'L' ? 'left-stack' : 'right-stack';
        document.getElementById(stackId).appendChild(brick);

        if (isCorrect) {
            state.roundHits++;
            state.totalCorrect++;
            state.coins += (state.speed >= 1.3 ? 20 : 10);
        } else {
            state.lives--;
            if(state.lives <= 0) return showMenu('game-over');
        }
        cleanup();
        updateUI();
        if(state.roundHits >= 10) {
            state.coins += 50;
            setTimeout(() => showMenu('round-win'), 500);
        } else {
            setTimeout(spawnBlock, 400);
        }
    }

    function cleanup() {
        if (currentBlock) {
            currentBlock.element.remove();
            currentBlock = null;
        }
        cancelAnimationFrame(animationId);
        animationId = null;
    }

    function renderShop() {
        const container = document.getElementById('shop-display');
        container.innerHTML = '';
        shopItems.forEach((item, index) => {
            const card = document.createElement('div');
            card.id = `item-${index}`;
            card.style = "background:#222; padding:15px; border-radius:12px; display:flex; flex-direction:column; align-items:center;";
            card.innerHTML = `
                <div style="font-size:35px; margin-bottom:10px;">${item.emoji}</div>
                <button onclick="buyItem(${index})" style="padding:8px 10px; font-size:12px; margin:0; width:100%;">💰 ${item.price}</button>
            `;
            container.appendChild(card);
        });
        document.getElementById('shop-coins').innerText = state.coins;
    }

    function buyItem(index) {
        const item = shopItems[index];
        if (state.coins >= item.price) {
            const card = document.getElementById(`item-${index}`);
            // Apply animation FIRST
            card.classList.add('purchased-anim');
            
            state.coins -= item.price;
            if(item.type === 'life') state.lives++;
            else state.unlocked.push(item.emoji);
            
            // Wait for animation to finish before a full re-render
            setTimeout(() => {
                renderShop();
                updateUI();
            }, 600);
        }
    }

    function renderBook() {
        const container = document.getElementById('book-display');
        container.innerHTML = '';
        state.unlocked.forEach(s => {
            const d = document.createElement('div');
            d.style = "font-size:55px; filter: drop-shadow(0 0 10px gold);";
            d.innerText = s;
            container.appendChild(d);
        });
    }

    function updateUI() {
        document.getElementById('menu-coin-text').innerText = `💰 ${state.coins}`;
        document.getElementById('lives-display').innerText = "❤️".repeat(Math.max(0, state.lives));
        document.getElementById('round-hits').innerText = state.roundHits;
        setSpeed(state.speed);
    }

    setSpeed(1.0);
</script>
</body>
</html>
