<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <title>Phonetic Flow v2.8.8</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --l-color: #2ecc71;
            --r-color: #e67e22;
            --ui-bg: rgba(30, 39, 46, 0.4);
            --accent: #f1c40f;
            --text-color: #ffffff;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --font-retro: 'Courier New', Courier, monospace;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background-color: var(--bg-color);
            font-family: var(--font-main);
            color: var(--text-color); user-select: none;
            touch-action: none;
        }

        #currency-display { 
            position: fixed; top: 20px; right: 20px; 
            font-size: 24px; color: var(--accent); 
            z-index: 500; font-weight: 900;
            background: rgba(0,0,0,0.8); padding: 8px 15px;
            border-radius: 20px; border: 2px solid var(--accent);
        }
        #lives-display { 
            position: fixed; top: 20px; left: 50%; 
            transform: translateX(-50%); font-size: 30px; 
            z-index: 500; 
        }

        #game-container { 
            position: relative; width: 100vw; height: 100vh; 
            display: flex; overflow: hidden; 
        }
        
        .bg-half { flex: 1; height: 100%; opacity: 0.12; pointer-events: none; }
        #l-bg { background-color: var(--l-color); border-right: 1px solid #333; }
        #r-bg { background-color: var(--r-color); }

        .lane-label {
            position: absolute; top: 15%; font-size: 150px; 
            font-weight: 900; color: var(--accent); 
            opacity: 0.2; z-index: 1; pointer-events: none;
        }
        #l-label { left: 10%; }
        #r-label { right: 10%; }

        .side-stack {
            position: absolute; bottom: 0; width: 40%; height: 100%;
            display: flex; flex-direction: column-reverse; pointer-events: none;
            z-index: 5;
        }
        #left-stack { left: 0; align-items: flex-start; padding-left: 10px; }
        #right-stack { right: 0; align-items: flex-end; padding-right: 10px; }

        /* VIZ-COMFORT BRICKS */
        .brick {
            width: 160px !important; 
            height: 60px !important; 
            margin: 5px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 15px; 
            font-size: 28px !important; 
            font-weight: 900;
            color: white;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.5);
            text-shadow: 2px 2px 4px rgba(0,0,0,1);
            animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Falling Block */
        .block {
            position: absolute; 
            width: 150px; height: 150px;
            background-color: #2c3e50; border: 8px solid var(--accent);
            border-radius: 35px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 80px; z-index: 20;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9); cursor: pointer;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 300; text-align: center; padding: 20px; box-sizing: border-box;
        }

        button {
            padding: 20px 30px; font-size: 22px; border-radius: 50px;
            border: none; background: #3498db; color: white; cursor: pointer;
            font-weight: 900; font-family: var(--font-main); margin: 10px;
        }

        .hidden { display: none !important; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px); }
            75% { transform: translateX(15px); }
        }
        .shake-ui { animation: shake 0.3s; }
    </style>
</head>
<body>

<div id="currency-display">💰 0</div>
<div id="lives-display">❤️❤️❤️</div>

<div id="game-container">
    <div id="l-bg" class="bg-half"></div>
    <div id="r-bg" class="bg-half"></div>
    <div id="l-label" class="lane-label">L</div>
    <div id="r-label" class="lane-label">R</div>
    <div id="left-stack" class="side-stack"></div>
    <div id="right-stack" class="side-stack"></div>
</div>

<div id="main-menu" class="overlay">
    <h1 style="color: var(--accent); font-size: 56px; margin-bottom: 20px; text-shadow: 3px 3px #000;">PHONETIC FLOW</h1>
    <p id="level-display-name" style="color: #ccc; margin-bottom: 30px; font-weight: bold; font-size: 24px;"></p>
    <button onclick="startGame()" style="background: var(--l-color); width: 300px; font-size: 28px;">START</button>
    <button id="btn-world-map" onclick="showMenu('level-select')" style="width: 300px;" class="hidden">WORLD MAP</button>
    <button onclick="showMenu('shop-menu')" style="width: 300px;">SHOP</button>
    <button onclick="showMenu('sticker-book')" style="width: 300px;">COLLECTION</button>
</div>

<div id="level-select" class="overlay hidden">
    <h2 style="color: var(--accent); font-size: 40px;">FLOOR SELECT</h2>
    <div id="tower-list" style="display: flex; flex-direction: column-reverse; width: 100%; align-items: center;"></div>
    <button onclick="showMenu('main-menu')" style="background: #444; width: 250px;">BACK</button>
</div>

<div id="shop-menu" class="overlay hidden">
    <div id="shopkeeper-area" style="background: #000; border: 4px solid #fff; padding: 20px; width: 90%; margin-bottom: 20px;">
        <div id="shopkeeper-text" style="font-weight: bold; font-size: 24px; font-family: var(--font-retro);"></div>
    </div>
    <div id="shop-items-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 100%; max-height: 50vh; overflow-y: auto;"></div>
    <div id="trade-ui" class="hidden"><div id="trade-options" style="display:flex; flex-wrap:wrap; justify-content:center;"></div></div>
    <button onclick="showMenu('main-menu')" style="background: #2980b9; width: 100%;">BACK</button>
</div>

<div id="sticker-book" class="overlay hidden">
    <h2 style="color: var(--accent); font-size: 40px;">STICKERS</h2>
    <div id="book-display" style="flex-grow: 1; overflow-y: auto; width: 100%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; padding: 20px;"></div>
    <button onclick="showMenu('main-menu')" style="background: #444; width: 250px;">BACK</button>
</div>

<div id="pause-menu" class="overlay hidden">
    <div style="background: rgba(30, 39, 46, 0.98); padding: 40px; border-radius: 30px; border: 6px solid var(--accent); width: 90%;">
        <h2 style="color: var(--accent); font-size: 48px;">PAUSED</h2>
        <button onclick="buyHeart()" style="background: #e74c3c; width: 220px; font-size: 24px;">❤️ BUY LIFE (75)</button>
        <div style="display: flex; justify-content: space-around; margin: 30px 0;">
            <button onclick="setSpeed(0.7)" style="font-size: 45px;">🐢</button>
            <button onclick="setSpeed(1.0)" style="font-size: 45px;">🧑</button>
            <button onclick="setSpeed(1.3)" style="font-size: 45px;">⚡</button>
        </div>
        <button onclick="closeMenus()" style="background: var(--l-color); width: 100%; font-size: 26px;">RESUME</button>
    </div>
</div>

<div id="round-win" class="overlay hidden">
    <h1 style="color: var(--l-color); font-size: 60px;">CLEAR!</h1>
    <button onclick="showMenu('main-menu')" style="font-size: 30px;">CONTINUE</button>
</div>

<div id="game-over" class="overlay hidden">
    <h1 style="color: var(--r-color); font-size: 60px;">GAME OVER</h1>
    <button onclick="startGame()" style="font-size: 30px;">RETRY</button>
</div>

<script>
    const levels = {
        1: { name: "L vs R Forest", labels: ["L", "R"], sigil: "🌲", pairs: [
            {word:"Light",type:"L"},{word:"Right",type:"R"},{word:"Glass",type:"L"},{word:"Grass",type:"R"},
            {word:"Collect",type:"L"},{word:"Correct",type:"R"},{word:"Tall",type:"L"},{word:"Door",type:"R"},
            {word:"Play",type:"L"},{word:"Pray",type:"R"}
        ], stickers: [
            {emoji:"☁️", price:50}, {emoji:"🌱", price:100}, {emoji:"🌲", price:200}, {emoji:"🦅", price:300}, {emoji:"💎", price:500}
        ]},
        2: { name: "V vs B Valley", labels: ["V", "B"], sigil: "🌊", pairs: [
            {word:"Vest",type:"L"},{word:"Best",type:"R"},{word:"Vote",type:"L"},{word:"Boat",type:"R"},
            {word:"Van",type:"L"},{word:"Ban",type:"R"},{word:"Vase",type:"L"},{word:"Base",type:"R"}
        ], stickers: [
            {emoji:"💧", price:50}, {emoji:"🐚", price:100}, {emoji:"🦀", price:200}, {emoji:"🦈", price:300}, {emoji:"🔱", price:500}
        ]},
        3: { name: "S vs TH Peak", labels: ["S", "TH"], sigil: "🏔️", pairs: [
            {word:"Sink",type:"L"},{word:"Think",type:"R"},{word:"Sank",type:"L"},{word:"Thank",type:"R"},
            {word:"Pass",type:"L"},{word:"Path",type:"R"}
        ], stickers: [
            {emoji:"❄️", price:50}, {emoji:"🧤", price:100}, {emoji:"⛺", price:200}, {emoji:"🎿", price:300}, {emoji:"🗻", price:500}
        ]}
    };

    let state = {
        curLevel: 1, maxLevel: 1, speed: 1.0, lives: 3, 
        coins: {1:0, 2:0, 3:0}, invest: {1:0, 2:0, 3:0}, 
        inventory: [], roundHits: 0, isPaused: true
    };

    let currentBlock = null;
    let animationId = null;
    const synth = window.speechSynthesis;

    function speak(text) {
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.rate = 0.7;
        synth.speak(utter);
    }

    function saveGame() { localStorage.setItem('phoneticFlowSave_v2.8.8', JSON.stringify(state)); }
    function loadGame() {
        const saved = localStorage.getItem('phoneticFlowSave_v2.8.8');
        if (saved) state = { ...state, ...JSON.parse(saved) };
        updateUI();
    }

    function showMenu(id) {
        state.isPaused = true;
        cleanup();
        document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'shop-menu') renderShop();
        if(id === 'level-select') renderTower();
        if(id === 'sticker-book') renderBook();
        updateUI();
    }

    function updateUI() {
        document.getElementById('currency-display').innerText = `💰 ${state.coins[state.curLevel]}`;
        document.getElementById('lives-display').innerText = "❤️".repeat(Math.max(0, state.lives));
        document.getElementById('level-display-name').innerText = levels[state.curLevel].name;
        if(state.maxLevel >= 2) document.getElementById('btn-world-map').classList.remove('hidden');
        document.getElementById('l-label').innerText = levels[state.curLevel].labels[0];
        document.getElementById('r-label').innerText = levels[state.curLevel].labels[1];
        saveGame();
    }

    function buyHeart() {
        if (state.coins[state.curLevel] >= 75) {
            state.coins[state.curLevel] -= 75;
            state.lives++;
            updateUI();
        }
    }

    function renderShop() {
        const grid = document.getElementById('shop-items-grid');
        grid.innerHTML = "";
        document.getElementById('shopkeeper-text').innerText = "BIG WORDS FOR BIG REWARDS!";
        levels[state.curLevel].stickers.forEach((item, idx) => {
            const count = state.inventory.filter(i => i.emoji === item.emoji).length;
            const card = document.createElement('div');
            card.innerHTML = `<div style="font-size:60px;">${item.emoji}</div>
                              <button onclick="buyItem('${item.emoji}', ${item.price})" ${count >= 2 ? 'disabled' : ''}>
                              ${count >= 2 ? 'SOLD' : '💰'+item.price}</button>`;
            grid.appendChild(card);
        });
    }

    function buyItem(emoji, price) {
        if (state.coins[state.curLevel] >= price) {
            state.coins[state.curLevel] -= price;
            state.invest[state.curLevel] += price;
            state.inventory.push({emoji, level: state.curLevel});
            renderShop(); updateUI();
        }
    }

    function startGame() {
        cleanup(); state.lives = 3; state.roundHits = 0;
        document.getElementById('left-stack').innerHTML = "";
        document.getElementById('right-stack').innerHTML = "";
        closeMenus();
    }

    function spawnBlock() {
        if (state.isPaused || state.lives <= 0 || state.roundHits >= 15) return;
        const pair = levels[state.curLevel].pairs[Math.floor(Math.random() * levels[state.curLevel].pairs.length)];
        speak(pair.word);
        const el = document.createElement('div');
        el.className = 'block'; el.innerText = "?";
        el.style.left = "calc(50% - 75px)"; el.style.top = "0px";
        el.addEventListener('pointerdown', (e) => { e.stopPropagation(); showMenu('pause-menu'); });
        document.getElementById('game-container').appendChild(el);
        currentBlock = { element: el, data: pair, top: 0 };
        animate();
    }

    function animate() {
        if (state.isPaused || !currentBlock) return;
        currentBlock.top += (2.2 * state.speed);
        currentBlock.element.style.top = currentBlock.top + "px";
        if (currentBlock.top > window.innerHeight - 180) resolve(null);
        else animationId = requestAnimationFrame(animate);
    }

    window.addEventListener('pointerdown', (e) => {
        if (state.isPaused || !currentBlock || e.target.closest('.block')) return;
        resolve(e.clientX < window.innerWidth / 2 ? "L" : "R");
    });

    function resolve(choice) {
        if (!currentBlock) return;
        const isCorrect = choice === currentBlock.data.type;
        const brick = document.createElement('div');
        brick.className = 'brick'; brick.innerText = currentBlock.data.word;
        brick.style.background = isCorrect ? 'var(--l-color)' : 'var(--r-color)';
        
        const target = choice === 'L' ? 'left-stack' : (choice === 'R' ? 'right-stack' : (currentBlock.data.type === 'L' ? 'right-stack' : 'left-stack'));
        document.getElementById(target).appendChild(brick);

        if (isCorrect) { 
            state.roundHits++; state.coins[state.curLevel] += 10; 
        } else { 
            state.lives--; 
            document.getElementById('lives-display').classList.add('shake-ui');
            setTimeout(() => document.getElementById('lives-display').classList.remove('shake-ui'), 300);
            if(state.lives <= 0) return showMenu('game-over'); 
        }
        cleanup(); updateUI();
        if(state.roundHits >= 15) setTimeout(() => showMenu('round-win'), 500);
        else setTimeout(spawnBlock, 400);
    }

    function cleanup() { if(currentBlock) currentBlock.element.remove(); currentBlock = null; cancelAnimationFrame(animationId); }
    function closeMenus() { document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden')); state.isPaused = false; spawnBlock(); }
    function setSpeed(s) { state.speed = s; updateUI(); }
    function renderTower() {
        const list = document.getElementById('tower-list'); list.innerHTML = "";
        for(let i=1; i<=3; i++) {
            const div = document.createElement('div');
            div.style.background = "#222"; div.style.width = "90%"; div.style.margin = "10px"; div.style.padding = "20px";
            div.style.borderRadius = "15px"; div.style.fontSize = "24px";
            div.innerHTML = `Floor ${i}: ${levels[i].name}`;
            if(i <= state.maxLevel) div.onclick = () => { state.curLevel = i; showMenu('main-menu'); };
            list.appendChild(div);
        }
    }
    function renderBook() {
        const b = document.getElementById('book-display'); b.innerHTML = "";
        state.inventory.forEach(i => {
            const d = document.createElement('div'); d.style.fontSize = "70px"; d.innerText = i.emoji;
            b.appendChild(d);
        });
    }

    loadGame();
</script>
</body>
</html>
