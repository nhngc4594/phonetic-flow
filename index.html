<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <title>Phonetic Flow v2.8.0</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --l-color: #2ecc71;
            --r-color: #e67e22;
            --ui-bg: rgba(30, 39, 46, 0.4);
            --accent: #f1c40f;
            --text-color: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Courier New', Courier, monospace;
            color: var(--text-color); user-select: none;
            touch-action: none;
        }

        /* Persistent UI Layer */
        #currency-display { 
            position: fixed; top: 20px; right: 20px; 
            font-size: 20px; color: var(--accent); 
            z-index: 500; font-weight: bold;
            text-shadow: 2px 2px #000;
        }
        #lives-display { 
            position: fixed; top: 20px; left: 50%; 
            transform: translateX(-50%); font-size: 26px; 
            z-index: 500; 
        }

        #game-container { 
            position: relative; width: 100vw; height: 100vh; 
            display: flex; overflow: hidden; 
        }
        
        .bg-half { flex: 1; height: 100%; opacity: 0.12; pointer-events: none; }
        #l-bg { background-color: var(--l-color); border-right: 1px solid #333; }
        #r-bg { background-color: var(--r-color); }

        .lane-label {
            position: absolute; bottom: 100px; font-size: 120px; font-weight: 900;
            color: var(--accent); opacity: 0.2; z-index: 2; pointer-events: none;
        }
        #l-label { left: 10%; }
        #r-label { right: 10%; }

        .side-stack {
            position: absolute; bottom: 80px; width: 160px; height: auto;
            display: flex; flex-direction: column-reverse; z-index: 10;
            padding: 10px; box-sizing: border-box; pointer-events: none;
        }
        #left-stack { left: 0; align-items: flex-start; }
        #right-stack { right: 0; align-items: flex-end; }
        
        .brick {
            width: 130px; height: 35px; margin-bottom: 4px;
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: bold; color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            animation: slideIn 0.2s ease-out; flex-shrink: 0;
        }

        .block {
            position: absolute; 
            width: 120px; height: 120px; /* Made bigger for easier tapping */
            background-color: #34495e; border: 4px solid var(--accent);
            border-radius: 24px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 40px; z-index: 20;
            box-shadow: 0 12px 35px rgba(0,0,0,0.8); cursor: pointer;
        }

        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes starBurst {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(1.6) drop-shadow(0 0 15px var(--accent)); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .purchased-anim { animation: starBurst 0.5s ease; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 300; text-align: center; padding: 20px; box-sizing: border-box;
        }

        /* Scalable Shop Layout */
        #shop-menu { justify-content: flex-start; padding-top: 60px; }
        #shopkeeper-area {
            background: #000; border: 3px solid #fff; border-radius: 10px;
            width: 100%; min-height: 140px; margin-bottom: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 10px; box-sizing: border-box; flex-shrink: 0;
        }
        #shopkeeper-text { font-size: 16px; color: #fff; line-height: 1.4; }

        .shop-container {
            width: 100%; display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; overflow-y: auto; flex-grow: 1; margin-bottom: 10px;
        }

       /* 1. Bigger, bolder Coin Display */
        #currency-display { 
            position: fixed; top: 20px; right: 20px; 
            font-size: 28px; /* Bigger font */
            color: var(--accent); z-index: 500; font-weight: 900;
            background: rgba(0,0,0,0.7); padding: 8px 20px;
            border-radius: 30px; border: 2px solid var(--accent);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* 2. The Gold Sparkle Animation */
        @keyframes goldSparkle {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.4); filter: brightness(2) drop-shadow(0 0 20px #f1c40f); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .purchased-anim { animation: goldSparkle 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* 3. Clean Sticker Grid (No Boxes) */
        .item-card {
            background: transparent; /* Box is gone! */
            padding: 5px;
            display: flex; flex-direction: column; align-items: center;
            transition: transform 0.2s;
        }

        /* 4. The Back Button Color (Deep Royal Blue) */
        .btn-back { background: #2980b9 !important; width: 100%; margin-top: auto; }
        .btn-back:active { background: #3498db !important; }

        .hidden { display: none !important; }

        button {
            padding: 12px 20px; font-size: 14px; border-radius: 40px;
            border: none; background: #3498db; color: white; cursor: pointer;
            font-weight: bold; font-family: inherit; margin: 4px;
        }
        button:disabled { background: #444; color: #888; }
        .active-yellow { background: var(--accent) !important; color: #000 !important; }

        .tower-item {
            background: #222; width: 85%; margin: 6px; padding: 15px;
            border-radius: 10px; border: 2px solid #444;
        }
#pause-menu { 
            background: rgba(0,0,0,0.4) !important; 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px); 
        }
/* Zone B: Shop Grid & Sticker Sizes */
        #shop-items-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            overflow-y: auto;
            padding: 10px;
            flex-grow: 1;
        }

        .item-card {
            background: transparent;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        /* The Gold Sparkle Animation */
        @keyframes goldSparkle {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.4); filter: brightness(2) drop-shadow(0 0 20px #f1c40f); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .purchased-anim { 
            animation: goldSparkle 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 100;
        }
/* This targets the emoji inside the shop card */
        .item-card div {
            font-size: 60px !important; /* Forces the emoji to be huge */
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 80px; /* Gives the emoji its own vertical space */
        }

        /* This makes the price buttons a bit wider and easier to tap */
        .item-card button {
            width: 90px !important;
            font-size: 14px !important;
            padding: 8px 0 !important;
        }
    </style>
</head>
<body>

<div id="currency-display">💰 0</div>
<div id="lives-display">❤️❤️❤️</div>

<div id="game-container">
    <div id="l-bg" class="bg-half"></div>
    <div id="r-bg" class="bg-half"></div>
    <div id="l-label" class="lane-label">L</div>
    <div id="r-label" class="lane-label">R</div>
    <div id="left-stack" class="side-stack"></div>
    <div id="right-stack" class="side-stack"></div>
</div>

<div id="main-menu" class="overlay">
    <h1 style="color: var(--accent); margin-bottom: 5px;">PHONETIC FLOW</h1>
    <p id="level-display-name" style="color: #888; margin-bottom: 20px;"></p>
    <button onclick="startGame()" style="background: var(--l-color); width: 200px;">START</button>
    <button id="btn-world-map" onclick="showMenu('level-select')" style="width: 200px;" class="hidden">WORLD MAP</button>
    <button onclick="showMenu('shop-menu')" style="width: 200px;">STICKER SHOP</button>
    <button onclick="showMenu('sticker-book')" style="width: 200px;">MY BOOK</button>
</div>

<div id="level-select" class="overlay hidden">
    <h2 style="color: var(--accent)">ASCENDING TOWER</h2>
    <div id="tower-list" style="display: flex; flex-direction: column-reverse; width: 100%; align-items: center;"></div>
    <button onclick="showMenu('main-menu')" style="background: #444; margin-top: 15px;">BACK</button>
</div>

<div id="shop-menu" class="overlay hidden">
    <div id="shopkeeper-area">
        <div style="font-size: 50px;">🧙‍♂️</div> <div id="shopkeeper-text" style="font-weight: bold; text-transform: uppercase;"></div>
    </div>

    <div id="shop-items-grid" class="shop-container"></div>

    <div id="trade-ui" class="hidden">
        <div id="trade-options" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>
    </div>

    <button onclick="showMenu('main-menu')" class="btn-back">BACK TO MENU</button>
</div>
<div id="sticker-book" class="overlay hidden">
    <h2 style="margin-top: 40px;">COLLECTION</h2>
    <div id="book-display" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; width:100%; padding:10px; box-sizing:border-box; overflow-y:auto;"></div>
    <button onclick="showMenu('main-menu')" style="background: #444; margin-top: auto;">BACK</button>
</div>

<div id="pause-menu" class="overlay hidden">
    <div style="background: rgba(30, 39, 46, 0.9); padding: 30px; border-radius: 20px; border: 1px solid var(--accent); width: 85%;">
        <h2 style="color: var(--accent);">PAUSED</h2>
        
        <div style="display: flex; justify-content: space-around; margin: 20px 0;">
            <div style="text-align: center;">
                <button id="speed-0.7" onclick="setSpeed(0.7)" style="font-size: 30px;">🐢</button>
                <p style="font-size: 12px; margin-top: 5px;">SLOW</p>
            </div>
            <div style="text-align: center;">
                <button id="speed-1.0" onclick="setSpeed(1.0)" style="font-size: 30px;">🧑</button>
                <p style="font-size: 12px; margin-top: 5px;">NORMAL</p>
            </div>
            <div style="text-align: center;">
                <button id="speed-1.3" onclick="setSpeed(1.3)" style="font-size: 30px;">⚡</button>
                <p style="font-size: 12px; margin-top: 5px;">FAST</p>
            </div>
        </div>

        <button onclick="closeMenus()" style="background: var(--l-color); width: 100%; margin-bottom: 10px;">RESUME</button>
        <button onclick="location.reload()" style="background: #e74c3c; width: 100%;">EXIT GAME</button>
    </div>
</div>
<div id="round-win" class="overlay hidden">
    <h1 style="color: var(--l-color);">CLEAR!</h1>
    <p>Bonus: 💰 +50</p>
    <button onclick="showMenu('main-menu')">CONTINUE</button>
</div>

<div id="game-over" class="overlay hidden">
    <h1 style="color: var(--r-color);">GAME OVER</h1>
    <button onclick="startGame()">RETRY</button>
    <button onclick="showMenu('main-menu')" style="background: #444;">EXIT</button>
</div>

<script>
    const levels = {
        1: { name: "L vs R Forest", sigil: "🌲", pairs: [
            {word:"Light",type:"L"},{word:"Right",type:"R"},{word:"Glass",type:"L"},{word:"Grass",type:"R"},
            {word:"Collect",type:"L"},{word:"Correct",type:"R"},{word:"Tall",type:"L"},{word:"Door",type:"R"},
            {word:"Play",type:"L"},{word:"Pray",type:"R"}
        ], stickers: [
            {emoji:"☁️", price:50}, {emoji:"🌱", price:100}, {emoji:"🌲", price:200}, {emoji:"🦅", price:300}, {emoji:"💎", price:500}
        ]},
        2: { name: "V vs B Valley", sigil: "🌊", pairs: [
            {word:"Vest",type:"L"},{word:"Best",type:"R"},{word:"Vote",type:"L"},{word:"Boat",type:"R"},
            {word:"Van",type:"L"},{word:"Ban",type:"R"},{word:"Vase",type:"L"},{word:"Base",type:"R"}
        ], stickers: [
            {emoji:"💧", price:50}, {emoji:"🐚", price:100}, {emoji:"🦀", price:200}, {emoji:"🦈", price:300}, {emoji:"🔱", price:500}
        ]},
        3: { name: "Eat vs It Peak", sigil: "🏔️", pairs: [
            {word:"Eat",type:"L"},{word:"It",type:"R"},{word:"Seat",type:"L"},{word:"Sit",type:"R"}
        ], stickers: [
            {emoji:"❄️", price:50}, {emoji:"🧤", price:100}, {emoji:"⛺", price:200}, {emoji:"🎿", price:300}, {emoji:"🗻", price:500}
        ]}
    };

function saveGame() {
        localStorage.setItem('phoneticFlowSave', JSON.stringify(state));
    }

    function loadGame() {
        const saved = localStorage.getItem('phoneticFlowSave');
        if (saved) {
            const parsed = JSON.parse(saved);
            // We merge the saved data into our current state
            state = { ...state, ...parsed };
            updateUI();
        }
    }
    let state = {
        curLevel: 1, maxLevel: 1, speed: 1.0, lives: 3, 
        coins: {1:0, 2:0, 3:0}, invest: {1:0, 2:0, 3:0}, 
        inventory: [], roundHits: 0, isPaused: true
    };

    let currentBlock = null;
    let animationId = null;
    let typeInterval = null;
    const synth = window.speechSynthesis;

    function typeWriter(text, callback) {
        clearInterval(typeInterval);
        const el = document.getElementById('shopkeeper-text');
        el.innerHTML = ""; let i = 0;
        typeInterval = setInterval(() => {
            el.innerHTML += text.charAt(i); i++;
            if (i >= text.length) { clearInterval(typeInterval); if(callback) callback(); }
        }, 40);
    }

    function showMenu(id) {
        state.isPaused = true;
        cancelAnimationFrame(animationId);
        document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'shop-menu') renderShop();
        if(id === 'level-select') renderTower();
        if(id === 'sticker-book') renderBook();
        updateUI();
    }

function buyItem(emoji, price, idx) {
        // This checks if you have enough money from the current floor
        if (state.coins[state.curLevel] >= price) {
            const card = document.getElementById(`shop-item-${idx}`);
            
            // Add the sparkle animation
            if(card) card.classList.add('purchased-anim');
            
            // Spend the money
            state.coins[state.curLevel] -= price;
            state.invest[state.curLevel] += price;
            state.inventory.push({emoji, level: state.curLevel});
            
            // Refresh everything after a short delay
            setTimeout(() => { 
                renderShop(); 
                updateUI(); 
            }, 600);
        } else {
            // Simple English for the wizard
            typeWriter("NOT ENOUGH COINS! PLAY MORE!");
        }
    }
    function renderShop() {
        const inv = state.invest[state.curLevel];
        const grid = document.getElementById('shop-items-grid');
        const trade = document.getElementById('trade-ui');
        grid.innerHTML = ""; grid.classList.remove('hidden'); trade.classList.add('hidden');

        if (inv >= 500 && !hasSigil(state.curLevel)) {
            // Simple English for the Sigil Trade
            typeWriter("YOU ARE READY. TRADE A RARE STICKER FOR THE MAGIC SIGIL?");
            grid.classList.add('hidden'); trade.classList.remove('hidden');
            const opts = document.getElementById('trade-options'); opts.innerHTML = "";
            const unique = [...new Set(state.inventory.filter(i => i.level === state.curLevel).map(i => i.emoji))];
            unique.forEach(emo => {
                const b = document.createElement('button'); b.innerText = emo;
                b.style.fontSize = "30px";
                b.onclick = () => processTrade(emo); opts.appendChild(b);
            });
        } else {
            // Simple greeting
            typeWriter("WELCOME! USE FLOOR " + state.curLevel + " COINS. BUY STICKERS!");
            levels[state.curLevel].stickers.forEach((item, idx) => {
                const count = state.inventory.filter(i => i.emoji === item.emoji).length;
                const card = document.createElement('div');
                card.className = "item-card";
                card.id = `shop-item-${idx}`;
                // Sticker Emoji size increased to 42px
                card.innerHTML = `<div style="font-size:42px; margin-bottom:10px;">${item.emoji}</div>
                                  <button onclick="buyItem('${item.emoji}', ${item.price}, ${idx})" 
                                  ${count >= 2 ? 'disabled' : ''} 
                                  style="font-size:12px; width:80px; padding:8px 0;">💰${item.price}</button>`;
                grid.appendChild(card);
            });
        }
    }

    function processTrade(emoji) {
        const price = levels[state.curLevel].stickers.find(s => s.emoji === emoji).price;
        if(price <= 50) { 
            typeWriter("NO. THAT IS TOO COMMON. GIVE ME A RARE STICKER."); 
            return; 
        }
        const idx = state.inventory.findIndex(i => i.emoji === emoji);
        state.inventory.splice(idx, 1);
        state.inventory.push({emoji: levels[state.curLevel].sigil, level: state.curLevel, isSigil: true});
        state.maxLevel = Math.max(state.maxLevel, state.curLevel + 1);
        typeWriter("THANK YOU! THE NEXT FLOOR IS OPEN.");
        setTimeout(() => showMenu('main-menu'), 2000);
    }

    function renderTower() {
        const list = document.getElementById('tower-list'); list.innerHTML = "";
        for(let i=1; i<=3; i++) {
            const div = document.createElement('div');
            div.className = "tower-item";
            const isLocked = i > state.maxLevel;
            div.style.borderColor = (state.curLevel === i) ? 'var(--accent)' : '#444';
            div.style.opacity = isLocked ? "0.4" : "1";
            div.innerHTML = `Floor ${i}: ${levels[i].name} ${isLocked ? '🔒' : '✅'}`;
            if(!isLocked) div.onclick = () => { state.curLevel = i; showMenu('main-menu'); };
            list.appendChild(div);
        }
    }

    function startGame() {
        cleanup(); state.lives = 3; state.roundHits = 0;
        document.getElementById('left-stack').innerHTML = "";
        document.getElementById('right-stack').innerHTML = "";
        closeMenus();
    }

    function spawnBlock() {
        if (state.isPaused || state.lives <= 0 || state.roundHits >= 15) return;
        const pool = levels[state.curLevel].pairs;
        const pair = pool[Math.floor(Math.random() * pool.length)];
        speak(pair.word, () => {
            if(state.isPaused || currentBlock) return;
            const el = document.createElement('div');
            el.className = 'block'; el.innerText = "?";
            el.style.left = "calc(50% - 50px)"; el.style.top = "0px";
            el.addEventListener('pointerdown', (e) => { e.stopPropagation(); showMenu('pause-menu'); });
            document.getElementById('game-container').appendChild(el);
            currentBlock = { element: el, data: pair, top: 0 };
            animate();
        });
    }

    function animate() {
        if (state.isPaused || !currentBlock) return;
        currentBlock.top += (2.2 * state.speed);
        currentBlock.element.style.top = currentBlock.top + "px";
        if (currentBlock.top > window.innerHeight - 120) resolve(null);
        else animationId = requestAnimationFrame(animate);
    }

    window.addEventListener('pointerdown', (e) => {
        if (state.isPaused || !currentBlock || e.target.closest('.block')) return;
        resolve(e.clientX < window.innerWidth / 2 ? "L" : "R");
    });

    function resolve(choice) {
        if (!currentBlock) return;
        const isCorrect = choice === currentBlock.data.type;
        const brick = document.createElement('div');
        brick.className = 'brick'; brick.innerText = currentBlock.data.word;
        brick.style.background = isCorrect ? 'var(--l-color)' : 'var(--r-color)';
        const target = (choice === 'L' || (!choice && currentBlock.data.type === 'R')) ? 'left-stack' : 'right-stack';
        document.getElementById(target).appendChild(brick);
        if (isCorrect) { state.roundHits++; state.coins[state.curLevel] += 10; }
        else { state.lives--; if(state.lives <= 0) return showMenu('game-over'); }
        cleanup(); updateUI();
        if(state.roundHits >= 15) { state.coins[state.curLevel] += 50; setTimeout(() => showMenu('round-win'), 500); }
        else setTimeout(spawnBlock, 400);
    }

    function setSpeed(s) { state.speed = s; updateUI(); }

    function setSpeed(s) { state.speed = s; updateUI(); }

 function setSpeed(s) {
        state.speed = s;
        // This ensures the button you click turns yellow
        document.querySelectorAll('#pause-menu button').forEach(b => b.classList.remove('active-yellow'));
        const btn = document.getElementById(`speed-${s.toFixed(1)}`);
        if(btn) btn.classList.add('active-yellow');
    }

   function updateUI() {
        document.getElementById('currency-display').innerText = `💰 ${state.coins[state.curLevel]}`;
        document.getElementById('lives-display').innerText = "❤️".repeat(Math.max(0, state.lives));
        document.getElementById('level-display-name').innerText = levels[state.curLevel].name;
        if(state.maxLevel >= 2) document.getElementById('btn-world-map').classList.remove('hidden');
        
        const btn = document.getElementById(`speed-${state.speed.toFixed(1)}`);
        if(btn) btn.classList.add('active-yellow');
        
        saveGame(); // This saves your coins every time the UI updates!
    }

    function cleanup() { if(currentBlock) currentBlock.element.remove(); currentBlock = null; cancelAnimationFrame(animationId); }
    
    function closeMenus() { 
        document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden')); 
        state.isPaused = false; 
        if(!currentBlock && state.roundHits < 15) {
            spawnBlock(); 
        } else if (currentBlock) {
            speak(currentBlock.data.word); // Repeats the word on resume
            animate(); 
        }
    }
    function renderBook() { 
        const b = document.getElementById('book-display'); b.innerHTML = "";
        state.inventory.forEach(i => { const d = document.createElement('div'); d.style="font-size:35px; background:#222; padding:10px; border-radius:10px;"; d.innerText=i.emoji; b.appendChild(d); });
    }
    function hasSigil(lv) { return state.inventory.some(i => i.level === lv && i.isSigil); }
    function speak(t, c) { synth.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='en-US'; u.rate=state.speed; if(c) u.onstart=c; synth.speak(u); }
    
   loadGame(); // Loads your coins when the app starts
    updateUI();
</script>
</body>
</html>
